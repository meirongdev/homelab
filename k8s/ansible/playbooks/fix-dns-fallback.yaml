---
# Ensure systemd-resolved has 8.8.8.8/1.1.1.1 as fallback DNS
# Prevents DNS failure when Tailscale MagicDNS is unavailable after network interruption
# Run: just fix-dns  (or: ansible-playbook -i inventory playbooks/fix-dns-fallback.yaml)
- name: Configure DNS fallback on K3s nodes
  hosts: k8s_masters
  become: true
  vars:
    coredns_public_forwarders: "forward . 1.1.1.1 8.8.8.8"
  tasks:
    - name: Create K3s config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Write clean resolv.conf for kubelet (pods' upstream DNS, no MagicDNS)
      copy:
        dest: /etc/rancher/k3s/resolv.conf
        content: |
          nameserver 8.8.8.8
          nameserver 1.1.1.1
        mode: "0644"

    # Point kubelet at the clean static file rather than systemd-resolved's flat
    # resolv.conf — the flat file carries Tailscale MagicDNS (100.100.100.100),
    # which can't resolve public names, so CoreDNS's default forward breaks.
    # With a clean file, the default `forward . /etc/resolv.conf` is correct and
    # self-heals across reboots (no CoreDNS override needed).
    - name: Point K3s kubelet at the clean resolv.conf
      blockinfile:
        path: /etc/rancher/k3s/config.yaml
        create: true
        marker: "# {mark} ANSIBLE MANAGED DNS"
        block: |
          kubelet-arg:
            - resolv-conf=/etc/rancher/k3s/resolv.conf
      notify: restart k3s

    - name: Create systemd-resolved drop-in directory
      file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"

    - name: Write DNS fallback config
      copy:
        dest: /etc/systemd/resolved.conf.d/fallback.conf
        content: |
          [Resolve]
          DNS=8.8.8.8 1.1.1.1
          FallbackDNS=8.8.4.4
        mode: "0644"
      notify: restart systemd-resolved

    - name: Ensure systemd-resolved is running
      systemd:
        name: systemd-resolved
        state: started
        enabled: true

    - name: Apply pending DNS service restarts before patching CoreDNS
      meta: flush_handlers

    - name: Wait for K3s API to be ready after DNS changes
      command: k3s kubectl get nodes
      register: k3s_ready
      until: k3s_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Read current CoreDNS Corefile
      command: >-
        k3s kubectl -n kube-system get configmap coredns
        -o go-template={{ "{{ index .data \"Corefile\" }}" }}
      register: coredns_corefile
      changed_when: false

    - name: Reapply public forwarders to CoreDNS
      shell: |
        cat > /tmp/coredns-patch.yaml <<'EOF'
        data:
          Corefile: |
        {{ coredns_corefile.stdout | regex_replace('forward \\. .*', coredns_public_forwarders) | indent(12, true) }}
        EOF
        k3s kubectl patch configmap coredns -n kube-system --type merge --patch-file /tmp/coredns-patch.yaml
      register: coredns_patch
      changed_when: "'(no change)' not in coredns_patch.stdout"

  handlers:
    - name: restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted

    - name: restart k3s
      systemd:
        name: k3s
        state: restarted
