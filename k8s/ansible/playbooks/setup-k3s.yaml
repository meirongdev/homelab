- name: Install prerequisites on K3s node
  hosts: k8s_masters
  become: true
  tasks:
    - name: Install prerequisites (nfs-common, curl, qemu-guest-agent)
      ansible.builtin.apt:
        name:
          - nfs-common
          - curl
          - qemu-guest-agent
        state: present
        update_cache: true

- name: Disable host firewall on homelab node
  hosts: k8s_masters
  become: true
  tasks:
    - name: Stop ufw if it is present
      ansible.builtin.systemd:
        name: ufw
        state: stopped
      failed_when: false

    - name: Disable ufw if it is present
      ansible.builtin.systemd:
        name: ufw
        enabled: false
      failed_when: false

    - name: Ensure ufw is disabled
      ansible.builtin.command: ufw disable
      register: ufw_disable
      changed_when: "'Firewall stopped' in ufw_disable.stdout or 'Firewall is inactive' not in ufw_disable.stdout"
      failed_when: false


- name: Tune kernel limits for K8s workloads
  hosts: k8s_masters
  become: true
  tasks:
    # K3s + Cilium + workloads (kopia, fluent-bit, kubelet, containerd, ...)
    # all create inotify watchers under uid=0. Ubuntu's default
    # max_user_instances=128 is exhausted in practice, surfacing as
    # "failed to create fsnotify watcher: too many open files".
    - name: Drop sysctl tuning for inotify + file-max
      ansible.builtin.copy:
        dest: /etc/sysctl.d/30-k8s-inotify.conf
        content: |
          fs.inotify.max_user_instances = 8192
          fs.inotify.max_user_watches = 524288
          fs.inotify.max_queued_events = 32768
        mode: "0644"
      notify: Reload sysctl

  handlers:
    - name: Reload sysctl
      ansible.builtin.command: sysctl --system
      changed_when: false

- name: Install K3s single node
  hosts: k8s_masters
  become: true
  tasks:
    - name: Enable qemu-guest-agent for Proxmox diagnostics
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Create K3s config directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    # Pods' upstream DNS. Deliberately NOT systemd-resolved's flat resolv.conf:
    # that file flattens away split-DNS routing and carries Tailscale MagicDNS
    # (100.100.100.100), which can't resolve public names → CoreDNS forward fails
    # intermittently. A static public-DNS file keeps CoreDNS's default
    # `forward . /etc/resolv.conf` correct and self-healing across reboots.
    # The node's own resolution is unaffected (it uses the 127.0.0.53 stub).
    - name: Write clean resolv.conf for kubelet (pods' upstream DNS, no MagicDNS)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/resolv.conf
        content: |
          nameserver 8.8.8.8
          nameserver 1.1.1.1
        mode: "0644"

    - name: Write K3s config (TLS SANs + Cilium CNI mode)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          tls-san:
            - {{ ansible_host }}
            - {{ hostvars[inventory_hostname]['tailscale_ip'] | default('') }}
          kubelet-arg:
            # Clean public-DNS resolv.conf (see the "Write clean resolv.conf" task
            # above) — avoids the MagicDNS-tainted systemd-resolved flat file.
            - resolv-conf=/etc/rancher/k3s/resolv.conf
            # Reserve resources for K3s server, containerd, Cilium agent
            - kube-reserved=cpu=200m,memory=512Mi,ephemeral-storage=2Gi
            # Reserve resources for systemd, sshd, journald, Tailscale
            - system-reserved=cpu=200m,memory=512Mi,ephemeral-storage=2Gi
            # Explicit eviction thresholds (default memory.available<100Mi is too low for a 10 GiB node)
            - eviction-hard=memory.available<300Mi,nodefs.available<10%
            - eviction-soft=memory.available<500Mi,nodefs.available<15%
            - eviction-soft-grace-period=memory.available=2m,nodefs.available=2m
            - eviction-max-pod-grace-period=60
          flannel-backend: "none"
          disable-network-policy: true
          disable-kube-proxy: true
          disable:
            - traefik
            - servicelb
        mode: "0644"

    - name: Configure DNS fallback (prevent CoreDNS failure after network interruption)
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"

    - name: Write DNS fallback config
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/fallback.conf
        content: |
          [Resolve]
          DNS=8.8.8.8 1.1.1.1
          FallbackDNS=8.8.4.4
        mode: "0644"

    - name: Restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted

    - name: Check if K3s is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install K3s
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      when: not k3s_binary.stat.exists
      changed_when: true

    - name: Wait for K3s to be ready
      ansible.builtin.command: k3s kubectl get nodes
      register: k3s_ready
      until: k3s_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    # CoreDNS needs no forward override: kubelet feeds pods the clean
    # /etc/rancher/k3s/resolv.conf (written above), so the bundled CoreDNS
    # default `forward . /etc/resolv.conf` resolves public names reliably.

- name: Verify Cluster
  hosts: k8s_masters
  become: true
  tasks:
    - name: Display cluster status
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: cluster_status
      changed_when: false

    - name: Show cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_status.stdout_lines }}"
