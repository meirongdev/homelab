- name: Install prerequisites on K3s node
  hosts: k8s_masters
  become: true
  tasks:
    - name: Install prerequisites (nfs-common, curl, qemu-guest-agent)
      ansible.builtin.apt:
        name:
          - nfs-common
          - curl
          - qemu-guest-agent
        state: present
        update_cache: true

- name: Disable host firewall on homelab node
  hosts: k8s_masters
  become: true
  tasks:
    - name: Stop ufw if it is present
      ansible.builtin.systemd:
        name: ufw
        state: stopped
      failed_when: false

    - name: Disable ufw if it is present
      ansible.builtin.systemd:
        name: ufw
        enabled: false
      failed_when: false

    - name: Ensure ufw is disabled
      ansible.builtin.command: ufw disable
      register: ufw_disable
      changed_when: "'Firewall stopped' in ufw_disable.stdout or 'Firewall is inactive' not in ufw_disable.stdout"
      failed_when: false


- name: Install K3s single node
  hosts: k8s_masters
  become: true
  tasks:
    - name: Enable qemu-guest-agent for Proxmox diagnostics
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Create K3s config directory
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Write K3s config (TLS SANs + Cilium CNI mode)
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          tls-san:
            - {{ ansible_host }}
            - {{ hostvars[inventory_hostname]['tailscale_ip'] | default('') }}
          kubelet-arg:
            # Use systemd-resolved's real upstream list instead of the 127.0.0.53 stub.
            - resolv-conf=/run/systemd/resolve/resolv.conf
          flannel-backend: "none"
          disable-network-policy: true
          disable-kube-proxy: true
          disable:
            - traefik
            - servicelb
        mode: "0644"

    - name: Configure DNS fallback (prevent CoreDNS failure after network interruption)
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"

    - name: Write DNS fallback config
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/fallback.conf
        content: |
          [Resolve]
          DNS=8.8.8.8 1.1.1.1
          FallbackDNS=8.8.4.4
        mode: "0644"

    - name: Restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted

    - name: Check if K3s is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install K3s
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      when: not k3s_binary.stat.exists
      changed_when: true

    - name: Wait for K3s to be ready
      ansible.builtin.command: k3s kubectl get nodes
      register: k3s_ready
      until: k3s_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

- name: Verify Cluster
  hosts: k8s_masters
  become: true
  tasks:
    - name: Display cluster status
      ansible.builtin.command: k3s kubectl get nodes -o wide
      register: cluster_status
      changed_when: false

    - name: Show cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_status.stdout_lines }}"
