---
# Power optimization for NAS (storage-node-1, Intel Celeron J4105 + ZFS)
# NOTE: HDD spin-down/APM is intentionally skipped — disks are in a ZFS pool.
#       ZFS background activity (scrub, checksum) would cause constant wakeups,
#       accelerating disk wear and causing NFS client timeouts.
- name: NAS power & thermal optimization
  hosts: storage_nodes
  become: true
  tasks:
    # ── 诊断 ──
    - name: Install lm-sensors and powertop
      apt:
        name:
          - lm-sensors
          - powertop
        state: present
        update_cache: true

    - name: Detect sensors
      command: sensors-detect --auto
      changed_when: false

    - name: Read current temperatures
      command: sensors
      register: sensors_before
      changed_when: false

    - name: Show baseline temperatures
      debug:
        var: sensors_before.stdout_lines

    # ── 优化1：powertop auto-tune（USB/PCIe 省电）──
    - name: Create powertop auto-tune service
      copy:
        dest: /etc/systemd/system/powertop-autotune.service
        content: |
          [Unit]
          Description=PowerTOP auto-tune
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/usr/sbin/powertop --auto-tune
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Enable and start powertop auto-tune
      systemd:
        name: powertop-autotune
        enabled: true
        state: started
        daemon_reload: true

    # ── 优化2：限制 ZFS ARC 内存（默认最多吃 50% RAM = 1.8GB）──
    # NFS 背靠 Storage-106 的 raidz1 3×4TB, 4GB ARC 可在 ZFS 读缓存与
    # 宿主机可用内存之间取得良好平衡（实测 7.6GB 总内存, ARC 4GB 后仍有 3GB+ 余量）。
    # 注: 2026-07-06 从 512MB 抬到 4GB, 全集群 NFS 读命中率显著提升。
    #     原 512MB 设于 2026-07-04, 当时 ARC 保守是因 NFS 仅服务 K3s 小 PVC,
    #     书库迁入后读流量增大, 4GB 更合理。若运行此 playbook 时 ARC 已设为
    #     更大值（例如 >4GB）, 请手动调高此值或跳过此 task。
    - name: Set ZFS ARC max to 4GB
      copy:
        dest: /etc/modprobe.d/zfs.conf
        content: |
          # ZFS ARC limit — set to 4GB for read cache (raidz1 3×4TB pool)
          # Increased from 512MB on 2026-07-06. If the pool grows or read
          # workload increases, bump this value (max safe: total_RAM - 2GB).
          options zfs zfs_arc_max=4294967296
        mode: "0644"

    - name: Apply ZFS ARC limit immediately
      shell: echo 4294967296 > /sys/module/zfs/parameters/zfs_arc_max
      changed_when: true

    - name: Check current ARC usage
      shell: "awk '/^size/ {printf \"ARC size: %.0f MB\\n\", $3/1024/1024}' /proc/spl/kstat/zfs/arcstats 2>/dev/null || echo 'ARC stats not available'"
      register: arc_stats
      changed_when: false

    - name: Show ARC stats
      debug:
        var: arc_stats.stdout

    # ── 优化3：移除 snapd（NAS 不需要，会定期唤醒）──
    - name: Check if snapd is installed
      shell: dpkg -l snapd 2>/dev/null | grep -q "^ii" && echo "installed" || echo "not installed"
      register: snapd_status
      changed_when: false

    - name: Remove snapd
      apt:
        name: snapd
        state: absent
        purge: true
      when: snapd_status.stdout == "installed"

    # ── 优化4：启用 SSD fstrim timer（OS 盘通常是 SSD/eMMC）──
    # fstrim.service + fstrim.timer 由 util-linux 提供（默认已安装）。
    # ZFS 池的磁盘通过 zpool trim 独立管理，fstrim -a 会自动跳过 ZFS 数据集。
    - name: Enable weekly fstrim timer for OS disk SSD
      systemd:
        name: fstrim.timer
        enabled: true
        state: started
        daemon_reload: true

    # ── 验证 ──
    - name: Read temperatures after optimization
      command: sensors
      register: sensors_after
      changed_when: false

    - name: Check memory after ARC limit
      shell: "free -h && echo '' && awk '/^size/ {printf \"ZFS ARC: %.0f MB\\n\", $3/1024/1024}' /proc/spl/kstat/zfs/arcstats 2>/dev/null"
      register: mem_after
      changed_when: false

    - name: "=== Optimization Results ==="
      debug:
        msg:
          - "Temperatures: {{ sensors_after.stdout_lines }}"
          - "Memory & ARC: {{ mem_after.stdout_lines }}"
          - "snapd: {{ 'removed' if snapd_status.stdout == 'installed' else 'was not installed' }}"
          - ""
          - "NOTE: HDD spin-down skipped intentionally (ZFS pool)"
          - "NOTE: ZFS ARC limit takes full effect after next reboot"
