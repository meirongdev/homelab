---
# 共用逻辑在 tailscale/ansible/roles/tailscale_node（roles_path 见 ansible.cfg）。
# 本文件只保留 homelab 差异：tailscale up 的 SNAT/netfilter 参数 + NFS LAN 路由 workaround。
- name: Setup Tailscale on homelab K3s node
  hosts: k8s_masters
  become: true
  vars:
    tailscale_advertise_routes: "10.42.0.0/16"
    tailscale_peer_routes:
      - 10.52.0.0/16 # oracle-k3s pod CIDR
    # netfilter/SNAT 关闭：Tailscale SNAT 会重映射 NFS 源端口、破坏 exports 的 secure 标志
    # （见 git log 2026-06/07 tailscale snat breakage for nfs）
    tailscale_up_extra_args: "--accept-dns=false --netfilter-mode=off --snat-subnet-routes=false"
  roles:
    - tailscale_node
  tasks:
    # --- NFS LAN-route fix (2026-07-06) ---
    # The MacBook `mbpm5` advertises 192.168.50.0/24 over Tailscale. With
    # `--accept-routes`, this node (and pve) route the NFS server 192.168.50.106
    # THROUGH that laptop, whose SNAT remaps NFS source ports to non-privileged
    # ports (breaks the exports' `secure` flag) and adds ~19ms latency (kills
    # SQLite-on-NFS workloads like calibre-web / zitadel-db on boot).
    # This rule forces 192.168.50.0/24 back onto the native LAN path
    # (node -> default gw pve -> vmbr0 -> storage-106), which is <1ms.
    # The SAME unit must exist on the pve host (192.168.50.4) — it is applied
    # there manually (no pve host playbook). Root cause to fix upstream: stop
    # mbpm5 from advertising 192.168.50.0/24. See git log 2026-07-06.
    - name: Install nfs-lan-route systemd unit (bypass Tailscale for LAN NFS)
      ansible.builtin.copy:
        dest: /etc/systemd/system/nfs-lan-route.service
        mode: "0644"
        content: |
          [Unit]
          Description=Route 192.168.50.0/24 (NFS server storage-106) via LAN, bypass Tailscale subnet route (mbpm5)
          After=tailscaled.service network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/sh -c "ip rule del to 192.168.50.0/24 lookup main priority 5260 2>/dev/null; ip rule add to 192.168.50.0/24 lookup main priority 5260"
          ExecStop=/bin/sh -c "ip rule del to 192.168.50.0/24 lookup main priority 5260 2>/dev/null || true"

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start nfs-lan-route unit
      ansible.builtin.systemd:
        name: nfs-lan-route.service
        enabled: true
        state: started
        daemon_reload: true
