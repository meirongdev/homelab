- name: Setup Tailscale on homelab K3s node
  hosts: k8s_masters
  become: true
  vars:
    advertise_routes: "10.42.0.0/16"
  tasks:
    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Tailscale signing key
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
        dest: /etc/apt/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Add Tailscale apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
        state: present

    - name: Install tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: true

    - name: Enable IP forwarding (required for subnet routing)
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "1"
        state: present
        sysctl_file: /etc/sysctl.d/99-tailscale.conf
        reload: true
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Clear stale Tailscale state if node was previously registered
      ansible.builtin.file:
        path: /var/lib/tailscale
        state: absent
      when: tailscale_force_reregister | default(false) | bool

    - name: Restart tailscaled after state clear
      ansible.builtin.systemd:
        name: tailscaled
        state: restarted
      when: tailscale_force_reregister | default(false) | bool

    - name: Join tailnet with subnet routes
      ansible.builtin.command: >
        tailscale up
        --advertise-routes={{ advertise_routes }}
        --accept-routes
        --accept-dns=false
        --netfilter-mode=off
        --snat-subnet-routes=false
        --authkey={{ tailscale_authkey }}
      changed_when: true

    - name: Add static route for oracle-k3s pod CIDR via Tailscale
      ansible.builtin.command: >
        ip route replace {{ item }} dev tailscale0
      loop:
        - 10.52.0.0/16
      changed_when: true

    - name: Persist oracle-k3s pod CIDR route across reboots
      ansible.builtin.copy:
        dest: /etc/networkd-dispatcher/routable.d/50-tailscale-routes.sh
        mode: "0755"
        content: |
          #!/bin/bash
          # Add route to oracle-k3s pod CIDR via Tailscale
          ip route replace 10.52.0.0/16 dev tailscale0 2>/dev/null || true

    # --- NFS LAN-route fix (2026-07-06) ---
    # The MacBook `mbpm5` advertises 192.168.50.0/24 over Tailscale. With
    # `--accept-routes`, this node (and pve) route the NFS server 192.168.50.106
    # THROUGH that laptop, whose SNAT remaps NFS source ports to non-privileged
    # ports (breaks the exports' `secure` flag) and adds ~19ms latency (kills
    # SQLite-on-NFS workloads like calibre-web / zitadel-db on boot).
    # This rule forces 192.168.50.0/24 back onto the native LAN path
    # (node -> default gw pve -> vmbr0 -> storage-106), which is <1ms.
    # The SAME unit must exist on the pve host (192.168.50.4) — it is applied
    # there manually (no pve host playbook). Root cause to fix upstream: stop
    # mbpm5 from advertising 192.168.50.0/24. See git log 2026-07-06.
    - name: Install nfs-lan-route systemd unit (bypass Tailscale for LAN NFS)
      ansible.builtin.copy:
        dest: /etc/systemd/system/nfs-lan-route.service
        mode: "0644"
        content: |
          [Unit]
          Description=Route 192.168.50.0/24 (NFS server storage-106) via LAN, bypass Tailscale subnet route (mbpm5)
          After=tailscaled.service network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/sh -c "ip rule del to 192.168.50.0/24 lookup main priority 5260 2>/dev/null; ip rule add to 192.168.50.0/24 lookup main priority 5260"
          ExecStop=/bin/sh -c "ip rule del to 192.168.50.0/24 lookup main priority 5260 2>/dev/null || true"

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start nfs-lan-route unit
      ansible.builtin.systemd:
        name: nfs-lan-route.service
        enabled: true
        state: started
        daemon_reload: true
