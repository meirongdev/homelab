---
# Vault path: secret/homelab/gotify  (property: alertmanager_app_token)
# Populate with: `vault kv patch secret/homelab/gotify alertmanager_app_token=<token>`
# Where <token> is a Gotify Application token created in the Gotify admin UI.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-gotify-token
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-gotify-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: homelab/gotify
        property: alertmanager_app_token
