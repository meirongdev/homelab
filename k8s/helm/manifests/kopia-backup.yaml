---
# Static PV/PVC mirrors of source data NFS subpaths into the kopia namespace.
# K8s PVC references in pod spec are namespace-local, so the backup CronJob
# (in `kopia`) cannot mount the original PVCs that live in `vault` /
# `personal-services`. We instead create cluster-scoped PVs that point at the
# same NFS paths the dynamic provisioner allocated, and bind them to local
# PVCs via `volumeName`. Reclaim policy is Retain so deleting these objects
# never touches the source data on NFS.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kopia-source-vault-data
  labels:
    app: kopia-backup
    source: vault-data-vault-0
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: 192.168.50.106
    path: /storage/nfs/k8s/vault-data-vault-0-pvc-b7460c9f-2c6f-407b-a1ed-ef45a11a2c1d
  claimRef:
    namespace: kopia
    name: kopia-source-vault-data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kopia-source-vault-audit
  labels:
    app: kopia-backup
    source: vault-audit-vault-0
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: 192.168.50.106
    path: /storage/nfs/k8s/vault-audit-vault-0-pvc-21f67c95-a7c9-4390-8deb-526ee6c931ed
  claimRef:
    namespace: kopia
    name: kopia-source-vault-audit
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kopia-source-calibre-config
  labels:
    app: kopia-backup
    source: personal-services-calibre-web-automated-config
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: 192.168.50.106
    path: /storage/nfs/k8s/personal-services-calibre-web-automated-config-pvc-17f5dbf3-9634-4fe7-880a-c06033095a19
  claimRef:
    namespace: kopia
    name: kopia-source-calibre-config
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kopia-source-gotify-data
  labels:
    app: kopia-backup
    source: personal-services-gotify-data
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: 192.168.50.106
    path: /storage/nfs/k8s/personal-services-gotify-data-pvc-44034e9a-54c7-4064-beaf-eac59671f1b7
  claimRef:
    namespace: kopia
    name: kopia-source-gotify-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kopia-source-vault-data
  namespace: kopia
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: kopia-source-vault-data
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kopia-source-vault-audit
  namespace: kopia
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: kopia-source-vault-audit
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kopia-source-calibre-config
  namespace: kopia
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: kopia-source-calibre-config
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kopia-source-gotify-data
  namespace: kopia
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: kopia-source-gotify-data
  resources:
    requests:
      storage: 1Gi
---
# CronJob: daily backup of homelab P0/P1 data to local Kopia server
# P0: Vault (file-level), ZITADEL PostgreSQL (pg_dump)
# P1: Calibre-Web config (file-level), Gotify (file-level)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-backup
  namespace: kopia
  labels:
    app: kopia-backup
spec:
  # 每天凌晨 2:00 UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: kopia-backup
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: staging
              emptyDir:
                # sized for: calibre-web config (~2.1Gi), zitadel pg_dump,
                # vault data/audit (<1MiB), gotify (<1MiB) plus headroom
                sizeLimit: 8Gi
            # Vault data (mirrored NFS PV in kopia ns)
            - name: vault-data
              persistentVolumeClaim:
                claimName: kopia-source-vault-data
                readOnly: true
            # Vault audit logs
            - name: vault-audit
              persistentVolumeClaim:
                claimName: kopia-source-vault-audit
                readOnly: true
            # Calibre-Web automated config
            - name: calibre-config
              persistentVolumeClaim:
                claimName: kopia-source-calibre-config
                readOnly: true
            # Gotify data
            - name: gotify-data
              persistentVolumeClaim:
                claimName: kopia-source-gotify-data
                readOnly: true
            # Kopia config (to reuse server's repo config)
            - name: kopia-config
              persistentVolumeClaim:
                claimName: kopia-config
                readOnly: true
            # Kopia repository storage (filesystem backend at /repository).
            # The from-config repository.config points at /repository, so the
            # client must see the same RWX NFS path the server uses. Kopia is
            # concurrency-safe across multiple clients on the same repo.
            - name: kopia-repository
              persistentVolumeClaim:
                claimName: kopia-repository

          initContainers:
            # Step 1: Vault file-level backup
            - name: vault-backup
              image: alpine:3.21
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /staging/vault/data /staging/vault/audit
                  echo "Backing up Vault data directory..."
                  cp -r /vault-data/* /staging/vault/data/ 2>/dev/null || true
                  echo "Backing up Vault audit logs..."
                  cp -r /vault-audit/* /staging/vault/audit/ 2>/dev/null || true
                  echo "Vault backup done: $(du -sh /staging/vault/ | cut -f1)"
              volumeMounts:
                - name: staging
                  mountPath: /staging
                - name: vault-data
                  mountPath: /vault-data
                  readOnly: true
                - name: vault-audit
                  mountPath: /vault-audit
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 256Mi

            # Step 2: ZITADEL PostgreSQL dump (cross-namespace via service DNS)
            - name: zitadel-pg-dump
              image: postgres:15-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /staging/zitadel-postgres
                  echo "Dumping ZITADEL PostgreSQL..."
                  PGPASSWORD="${ZITADEL_DB_PASSWORD}" pg_dump \
                    -h zitadel-db-postgresql.zitadel.svc.cluster.local \
                    -U postgres \
                    -d zitadel \
                    --format=custom --compress=9 \
                    -f /staging/zitadel-postgres/zitadel.dump 2>&1 || {
                      echo "WARNING: ZITADEL pg_dump failed (DB credentials may need updating)"
                      echo "Skipping ZITADEL DB backup"
                    }
                  if [ -f /staging/zitadel-postgres/zitadel.dump ]; then
                    echo "ZITADEL dump done: $(du -sh /staging/zitadel-postgres/zitadel.dump | cut -f1)"
                  fi
              env:
                - name: ZITADEL_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: zitadel-db-password
                      key: password
                      optional: true
              volumeMounts:
                - name: staging
                  mountPath: /staging
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

            # Step 3: Calibre-Web config backup
            - name: calibre-config-backup
              image: alpine:3.21
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /staging/calibre-web
                  echo "Backing up Calibre-Web config..."
                  cp -r /calibre-config/* /staging/calibre-web/ 2>/dev/null || true
                  echo "Calibre-Web backup done: $(du -sh /staging/calibre-web/ | cut -f1)"
              volumeMounts:
                - name: staging
                  mountPath: /staging
                - name: calibre-config
                  mountPath: /calibre-config
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

            # Step 4: Gotify data backup
            - name: gotify-backup
              image: alpine:3.21
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /staging/gotify
                  echo "Backing up Gotify data..."
                  cp -r /gotify-data/* /staging/gotify/ 2>/dev/null || true
                  echo "Gotify backup done: $(du -sh /staging/gotify/ | cut -f1)"
              volumeMounts:
                - name: staging
                  mountPath: /staging
                - name: gotify-data
                  mountPath: /gotify-data
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

          # Main container: kopia snapshot using local repo config
          containers:
            - name: kopia-snapshot
              image: kopia/kopia:latest
              env:
                - name: KOPIA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: kopia-secret
                      key: repo-password
                - name: KOPIA_CHECK_FOR_UPDATES
                  value: "false"
                # Image bakes KOPIA_CONFIG_PATH=/app/config/repository.config,
                # but that mount is read-only here. Point client state at /tmp.
                - name: KOPIA_CONFIG_PATH
                  value: /tmp/kopia/repository.config
                - name: KOPIA_CACHE_DIRECTORY
                  value: /tmp/kopia-cache
                - name: KOPIA_LOG_DIR
                  value: /tmp/kopia-logs
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /tmp/kopia /tmp/kopia-cache /tmp/kopia-logs
                  echo "Connecting to kopia repository..."
                  kopia repository connect from-config \
                    --file=/app/config/repository.config \
                    --cache-directory=/tmp/kopia-cache \
                    --override-username=backup \
                    --override-hostname=homelab

                  echo "=== Creating snapshots ==="

                  echo "Snapshot: Vault data..."
                  kopia snapshot create /staging/vault \
                    --tags="cluster:homelab" \
                    --tags="service:vault" \
                    --tags="priority:P0" || echo "WARNING: Vault snapshot failed"

                  if [ -f /staging/zitadel-postgres/zitadel.dump ]; then
                    echo "Snapshot: ZITADEL PostgreSQL dump..."
                    kopia snapshot create /staging/zitadel-postgres \
                      --tags="cluster:homelab" \
                      --tags="service:zitadel-postgresql" \
                      --tags="priority:P0" || echo "WARNING: ZITADEL snapshot failed"
                  fi

                  echo "Snapshot: Calibre-Web config..."
                  kopia snapshot create /staging/calibre-web \
                    --tags="cluster:homelab" \
                    --tags="service:calibre-web" \
                    --tags="priority:P1" || echo "WARNING: Calibre-Web snapshot failed"

                  echo "Snapshot: Gotify data..."
                  kopia snapshot create /staging/gotify \
                    --tags="cluster:homelab" \
                    --tags="service:gotify" \
                    --tags="priority:P1" || echo "WARNING: Gotify snapshot failed"

                  echo "=== Snapshot summary ==="
                  kopia snapshot list --all | tail -20

                  kopia repository disconnect
                  echo "Homelab backup completed successfully."
              volumeMounts:
                - name: staging
                  mountPath: /staging
                - name: kopia-config
                  mountPath: /app/config
                  readOnly: true
                - name: kopia-repository
                  mountPath: /repository
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
---
# ExternalSecret for ZITADEL DB password (needed by pg_dump)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zitadel-db-password
  namespace: kopia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: zitadel-db-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/homelab/zitadel
        property: db-password
