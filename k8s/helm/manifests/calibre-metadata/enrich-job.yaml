---
apiVersion: batch/v1
kind: Job
metadata:
  name: calibre-metadata-enrich
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 604800  # 7天后自动清理
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: metadata-enrich
          image: crocodilestick/calibre-web-automated@sha256:4ff5be5cd6f18d91cc72bf316260d8c34c980f09a862372bc77d25c9ddb0efef
          command:
            - python3
            - /scripts/enrich_metadata.py
          env:
            - name: LD_LIBRARY_PATH
              value: "/app/calibre/lib"
            - name: TZ
              value: "Asia/Shanghai"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              # 写 "1" 而非 1000m: API server 会把 1000m 规范化为 1，Job template 不可变，
              # 二者不一致会让 SSA diff 永久 OutOfSync 且无法 apply（field is immutable）。
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: calibre-library
              mountPath: /calibre-library
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: calibre-library
          persistentVolumeClaim:
            claimName: calibre-books-local
        - name: scripts
          configMap:
            name: metadata-enrich-script
            defaultMode: 0755
