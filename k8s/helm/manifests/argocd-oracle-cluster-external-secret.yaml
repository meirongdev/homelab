# ESO 物化 homelab ArgoCD 的 oracle-k3s 外部集群凭据。
# Vault: secret/homelab/argocd-oracle-cluster (keys: bearerToken, caData)
#   - bearerToken: oracle kube-system/argocd-manager SA 的不过期 token(见 Task 2)
#   - caData:      oracle 集群 CA(base64 PEM,即 argocd-manager-token Secret 的 ca.crt)
# 生成的 Secret 带 argocd.argoproj.io/secret-type=cluster 标签,ArgoCD 据此识别外部集群。
# server 走 Tailscale,caData 校验 API 证书(已含该 IP 的 SAN,见 Task 1)。
# 见 docs/plans/2026-06-04-oracle-k3s-argocd-gitops.md
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oracle-k3s-cluster
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: oracle-k3s-cluster
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
      data:
        name: oracle-k3s
        server: https://100.107.166.37:6443
        config: |
          {
            "bearerToken": "{{ .bearerToken }}",
            "tlsClientConfig": {
              "caData": "{{ .caData }}"
            }
          }
  data:
    - secretKey: bearerToken
      remoteRef:
        key: secret/homelab/argocd-oracle-cluster
        property: bearerToken
    - secretKey: caData
      remoteRef:
        key: secret/homelab/argocd-oracle-cluster
        property: caData
