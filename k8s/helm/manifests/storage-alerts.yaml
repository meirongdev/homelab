apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: storage-health-alerts
  namespace: monitoring
  labels:
    # 必须带此 label 才会被 kube-prometheus-stack operator 的 ruleSelector 选中
    release: kube-prometheus-stack
spec:
  groups:
    - name: smart-disk-health
      rules:
        # SMART 整体健康失败（device_smart_status: 1=passed, 0=failed）
        - alert: SmartHealthFailed
          expr: smartctl_device_smart_status == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "SMART 整体健康失败: {{ $labels.device }} @ {{ $labels.nodename }}"
            description: "smartctl_device_smart_status=0（磁盘自检报告失败）—— 尽快更换。instance={{ $labels.instance }}"
        # 介质错误（坏块）出现
        - alert: SmartMediaErrors
          expr: smartctl_device_media_errors > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "SMART 介质错误: {{ $labels.device }} @ {{ $labels.nodename }}"
            description: "smartctl_device_media_errors={{ $value }} —— 磁盘出现坏块/介质错误，关注趋势。"
        # NVMe 寿命接近耗尽（percentage_used 越接近 100 越坏）
        - alert: NvmeWearHigh
          expr: smartctl_device_percentage_used > 90
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "NVMe 寿命告急: {{ $labels.device }} @ {{ $labels.nodename }}"
            description: "percentage_used={{ $value }}%（>90% 表示写入寿命接近耗尽）—— 计划更换。"
        # NVMe 可用备用块偏低
        - alert: NvmeSpareLow
          expr: smartctl_device_available_spare < 10 and smartctl_device_available_spare > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "NVMe 备用块偏低: {{ $labels.device }} @ {{ $labels.nodename }}"
            description: "available_spare={{ $value }}%（<10%）—— 备用块耗尽前更换。"
    - name: zfs-pool-health
      rules:
        # zpool 非 online（degraded/faulted/unavail/…）。node_zfs_zpool_state{state="online"}=0 即异常
        - alert: ZpoolNotOnline
          expr: node_zfs_zpool_state{state="online"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "ZFS 池非 ONLINE: {{ $labels.zpool }} @ {{ $labels.instance }}"
            description: "node_zfs_zpool_state{state=online}=0 —— 池处于 degraded/faulted 等状态。raidz1 仅容 1 盘，resilver 期第二盘故障会毁池；离站备份是最终安全网（见 backup-recovery runbook）。"

    - name: nvme-wear-trend
      rules:
        # 14 日窗口的每日磨损增量（percentage_used/天）。低写入负载下可能为 0。
        - record: nvme_wear_daily_rate
          expr: clamp_min(deriv(smartctl_device_percentage_used[14d]) * 86400, 0)
        # 基于 30 天线性趋势预测 90 天后的 percentage_used
        - record: nvme_predicted_wear_90d
          expr: predict_linear(smartctl_device_percentage_used[30d], 90 * 86400)
        # 趋势报警：90 天内预测 wear > 85%（写入加速时比静态阈值 NvmeWearHigh 更早预警）
        - alert: NvmeWearAccelerating
          expr: predict_linear(smartctl_device_percentage_used[30d], 90 * 86400) > 85
          for: 6h
          labels:
            severity: warning
          annotations:
            summary: "NVMe {{ $labels.device }} @ {{ $labels.nodename }} 磨损加速，90 天预测 >85%"
            description: |
              基于 30 天线性趋势，预测 90 天后 percentage_used ≈ {{ $value | humanize }}%。
              当前磨损值与日增速率见 smartctl_device_percentage_used / nvme_wear_daily_rate。
              如写入量持续，需计划换盘；NvmeWearHigh（静态 >90%）为最终确认。

    - name: zfs-scrub-overdue
      rules:
        # 记录距离上次 scrub 的天数，供看板和告警使用
        - record: zpool_scrub_age_days
          expr: (time() - node_zfs_zpool_scrub_last_scrub_timestamp_seconds) / 86400
        # zpool 超过 35 天未 scrub（正常每月一次，35 天阈值留了 3-5 天余量）
        - alert: ZpoolScrubOverdue
          expr: (time() - node_zfs_zpool_scrub_last_scrub_timestamp_seconds) / 86400 > 35
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "ZFS 池 {{ $labels.zpool }} 已 {{ $value | humanize }} 天未 scrub @ {{ $labels.instance }}"
            description: "上次 scrub 距今 >35 天。zfsutils-linux timer 可能被禁用、卸载或重启后未恢复。运行 `systemctl status zfs-scrub.timer` 检查。"
