---
# external-dns Cloudflare API token. Reuses the SAME token already validated for the
# oracle-k3s cloudflare/terraform project (cloud/oracle/cloudflare/terraform.tfvars) —
# it's a real, working Zone-scoped Cloudflare API token, unlike the value currently sitting
# in homelab's cloudflare/terraform/terraform.tfvars (that one is a Tunnel connector token,
# not an API token — breaks `terraform plan` for that project; unrelated pre-existing bug,
# tracked separately, not fixed here).
# Vault: secret/homelab/external-dns  property=api_token (homelab ClusterSecretStore path=secret, KV v2).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  namespace: external-dns
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: external-dns-cloudflare
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-token
      remoteRef:
        key: homelab/external-dns
        property: api_token
