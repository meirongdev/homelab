---
# Alertmanager Telegram bot token —— Vault ← ESO(替换 2026-07-18 迁移时的 imperative secret)。
# Vault: secret/homelab/telegram  property=bot_token(homelab ClusterSecretStore path=secret, KV v2)。
# 产出 k8s secret monitoring/alertmanager-telegram key=bot-token,被
# alertmanager-config.yaml 的 telegramConfigs.botToken 引用。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-telegram
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-telegram
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: bot-token
      remoteRef:
        key: homelab/telegram
        property: bot_token
