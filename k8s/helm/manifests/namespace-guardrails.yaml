# 命名空间级 LimitRange 护栏 —— 给未声明资源的容器注入默认 requests/limits。
#
# 目的：
#   1) 节点保护：未声明资源的容器不再被当作 0-request/无界（热笔记本防 OOM/驱逐）。
#   2) 满足 Kyverno require-requests-limits：LimitRanger(内置 mutating 准入)在 Kyverno 校验
#      之前注入默认值 → 新建 Pod 自动带 requests.cpu/memory + limits.memory → 逐步逼近零违规。
#
# 设计（关键安全点）：
#   - default.memory 取**宽松 1Gi**：LimitRange 规则要求 limits.memory >= requests.memory，
#     若默认上限低于某容器已声明的 request 会**直接拒绝 Pod**。这些轻量应用 ns 无容器 request 近 1Gi，
#     故 1Gi 既给出上限又零拒绝风险。**不设 cpu limit** 以避免 CPU 节流。
#   - 仅作用于"未自带 resources"的容器；自带的(如 vault 主体、argocd 各组件)不受影响。
#   - 仅覆盖**有 require-limits 违规的轻量应用 ns**；monitoring(重量级 prometheus/loki，交 chart values)、
#     kube-system(系统组件)**刻意不加**，避免上述拒绝风险。
#   - personal-services 已有自己的 LimitRange(personal-services-limits.yaml)，不在此重复。
#
# 由 ArgoCD `namespace-guardrails` Application 同步（git push → 3 分钟内）。
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resource-guardrail
  namespace: external-secrets
spec:
  limits:
    - type: Container
      defaultRequest: { cpu: 25m, memory: 64Mi }
      default: { memory: 1Gi }
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resource-guardrail
  namespace: argocd
spec:
  limits:
    - type: Container
      defaultRequest: { cpu: 25m, memory: 64Mi }
      default: { memory: 1Gi }
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resource-guardrail
  namespace: vault
spec:
  limits:
    - type: Container
      defaultRequest: { cpu: 25m, memory: 64Mi }
      default: { memory: 1Gi }
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-resource-guardrail
  namespace: default
spec:
  limits:
    - type: Container
      defaultRequest: { cpu: 25m, memory: 64Mi }
      default: { memory: 1Gi }
