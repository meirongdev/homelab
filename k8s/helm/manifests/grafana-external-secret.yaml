apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
  - secretKey: admin-user
    remoteRef:
      key: secret/homelab/grafana
      property: admin-user
  - secretKey: admin-password
    remoteRef:
      key: secret/homelab/grafana
      property: admin-password
  # ZITADEL OIDC client (native generic_oauth SSO; local admin login above stays as fallback).
  # Provisioned by zitadel/scripts/configure-oidc-app.sh (app "grafana",
  # redirect https://grafana.meirong.dev/login/generic_oauth). Stored in the same
  # Vault path: secret/homelab/grafana (keys: oauth_client_id, oauth_client_secret).
  - secretKey: oauth-client-id
    remoteRef:
      key: secret/homelab/grafana
      property: oauth_client_id
  - secretKey: oauth-client-secret
    remoteRef:
      key: secret/homelab/grafana
      property: oauth_client_secret
