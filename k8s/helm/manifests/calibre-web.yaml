---
apiVersion: v1
kind: Namespace
metadata:
  name: personal-services
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-web-automated-config
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: calibre-books-pv
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.50.106
    path: /storage/calibre
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-books
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: calibre-books-pv
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre-web
  namespace: personal-services
  labels:
    app: calibre-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calibre-web
  template:
    metadata:
      labels:
        app: calibre-web
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: calibre-web
          image: crocodilestick/calibre-web-automated:latest
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Shanghai"
            - name: NETWORK_SHARE_MODE
              value: "true"
            - name: TRUSTED_PROXY_COUNT
              value: "1"
            - name: CWA_WATCH_MODE
              value: "poll"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /login
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /login
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
            - name: books
              mountPath: /calibre-library
            - name: books
              mountPath: /cwa-book-ingest
              subPath: ingest
        - name: log-exporter
          image: busybox
          command: ["sh", "-c", "tail -F /config/calibre-web.log 2>/dev/null"]
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
        # Fixes ownership of files created by the cwa-ingest pipeline, which runs
        # as root inside the upstream image and produces root-owned books that
        # the web process (uid 1000) cannot edit afterwards.
        - name: permission-fixer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -u
              echo "[fix-perms] starting; target uid:gid = 1000:1000"
              while true; do
                fixed=$(find /library \( ! -uid 1000 -o ! -gid 1000 \) -print 2>/dev/null | wc -l)
                if [ "$fixed" -gt 0 ]; then
                  find /library \( ! -uid 1000 -o ! -gid 1000 \) -exec chown 1000:1000 {} + 2>/dev/null || true
                  echo "[fix-perms] chowned $fixed entries to 1000:1000"
                fi
                sleep 30
              done
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 32Mi
          volumeMounts:
            - name: books
              mountPath: /library
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: calibre-web-automated-config
        - name: books
          persistentVolumeClaim:
            claimName: calibre-books
---
apiVersion: v1
kind: Service
metadata:
  name: calibre-web
  namespace: personal-services
spec:
  type: NodePort
  selector:
    app: calibre-web
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30083
      name: http
