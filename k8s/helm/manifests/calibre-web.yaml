---
apiVersion: v1
kind: Namespace
metadata:
  name: personal-services
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # migrated NFS→local-path 2026-07-06 (sqlite app.db/cwa.db fsync; Phase 2).
  # processed_books(11G) 一并迁；thumbnails(12k 小文件,可重建)未迁,calibre 会按需重建。
  name: calibre-web-automated-config-local
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: calibre-books-pv
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.50.106
    path: /storage/calibre
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-books
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: calibre-books-pv
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre-web
  namespace: personal-services
  labels:
    app: calibre-web
spec:
  replicas: 1
  # SQLite (/config/cwa.db) is held with an exclusive write lock by the live
  # calibre-web container; a rolling update would let the new pod's
  # disable-auto-convert init container race the old pod for that lock.
  strategy:
    type: Recreate
    # Explicit null so server-side apply drops any prior rollingUpdate block
    # K8s rejects rollingUpdate when type=Recreate.
    rollingUpdate: null
  selector:
    matchLabels:
      app: calibre-web
  template:
    metadata:
      labels:
        app: calibre-web
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: disable-auto-convert
          image: python:3.11-slim
          command:
            - python3
            - -c
            - |
              import sqlite3, sys
              db_path = '/config/cwa.db'
              try:
                db = sqlite3.connect(db_path, timeout=30)
                cursor = db.cursor()
                cursor.execute("UPDATE cwa_settings SET auto_convert = 0;")
                db.commit()
                cursor.execute("SELECT auto_convert FROM cwa_settings;")
                result = cursor.fetchone()
                if not result or result[0] != 0:
                    print(f"[INIT] verification failed, auto_convert is {result}")
                    sys.exit(1)
                print(f"[INIT] auto_convert set to: {result[0]}")
                db.close()
              except Exception as e:
                print(f"[INIT] could not modify cwa.db: {e}")
                sys.exit(1)
          volumeMounts:
            - name: config
              mountPath: /config
        - name: fix-permissions-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -u
              MARKER=/library/.permissions-baseline-v1
              if [ -f "$MARKER" ]; then
                echo "[init] marker found — skipping full scan (~1900 books on NFS would cost ~90s)"
                echo "[init] permission-fixer sidecar will catch incremental drift within 30s"
                exit 0
              fi
              echo "[init] no marker — applying baseline permissions once..."
              find /library -type f ! -perm 666 -exec chmod 666 {} + 2>/dev/null || true
              find /library -type d ! -perm 777 -exec chmod 777 {} + 2>/dev/null || true
              touch "$MARKER"
              echo "[init] baseline applied + marker placed"
          volumeMounts:
            - name: books
              mountPath: /library
      containers:
        - name: calibre-web
          image: crocodilestick/calibre-web-automated@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Shanghai"
            - name: NETWORK_SHARE_MODE
              value: "true"
            - name: TRUSTED_PROXY_COUNT
              value: "1"
            - name: CWA_WATCH_MODE
              value: "poll"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # startupProbe gates liveness/readiness until the app finishes its
          # slow NFS-backed cold start (~50s); allows up to 30×10s = 5min.
          startupProbe:
            httpGet:
              path: /login
              port: 8083
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 10
          # timeoutSeconds defaults to 1s — far too tight for an NFS-backed
          # (NETWORK_SHARE_MODE=true) /login render. Under NFS latency spikes
          # the 1s default failed 5× and kubelet killed the container, causing
          # a chronic restart loop. 10s gives the render room; a true hang
          # (>5×30s) still triggers a restart.
          livenessProbe:
            httpGet:
              path: /login
              port: 8083
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /login
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
            - name: books
              mountPath: /calibre-library
            - name: books
              mountPath: /cwa-book-ingest
              subPath: ingest
        - name: log-exporter
          image: busybox:1.36
          command: ["sh", "-c", "tail -F /config/calibre-web.log 2>/dev/null"]
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
        # Fixes permissions on files created by the cwa-ingest pipeline, which runs
        # as root and produces files that the web process (uid 1000) cannot edit.
        - name: permission-fixer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -u
              echo "[fix-perms] starting permission fixer loop"
              while true; do
                # Find and fix files not at 666
                files=$(find /library -type f ! -perm 666 -exec chmod 666 {} + 2>/dev/null | wc -l)
                # Find and fix directories not at 777
                dirs=$(find /library -type d ! -perm 777 -exec chmod 777 {} + 2>/dev/null | wc -l)
                if [ "$files" -gt 0 ] || [ "$dirs" -gt 0 ]; then
                  echo "[fix-perms] fixed $files files and $dirs directories"
                fi
                sleep 30
              done
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 32Mi
          volumeMounts:
            - name: books
              mountPath: /library
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: calibre-web-automated-config-local
        - name: books
          persistentVolumeClaim:
            claimName: calibre-books
---
apiVersion: v1
kind: Service
metadata:
  name: calibre-web
  namespace: personal-services
spec:
  type: NodePort
  selector:
    app: calibre-web
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30083
      name: http
