# argocd-oidc: ZITADEL OIDC client credentials for ArgoCD's native SSO (no dex).
# ArgoCD resolves `$argocd-oidc:oidc.clientID` / `$argocd-oidc:oidc.clientSecret`
# in argocd-cm by looking up a secret in the argocd namespace that carries the
# label app.kubernetes.io/part-of=argocd — set here via the ESO target template.
# Kept separate from the ArgoCD-managed `argocd-secret` so ESO doesn't fight ArgoCD
# for ownership. Client provisioned by zitadel/scripts/configure-oidc-app.sh
# (app "argocd"). Creds in Vault: secret/homelab/argocd-oidc
# (keys: oauth_client_id, oauth_client_secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
      data:
        oidc.clientID: "{{ .clientID }}"
        oidc.clientSecret: "{{ .clientSecret }}"
  data:
    - secretKey: clientID
      remoteRef:
        key: secret/homelab/argocd-oidc
        property: oauth_client_id
    - secretKey: clientSecret
      remoteRef:
        key: secret/homelab/argocd-oidc
        property: oauth_client_secret
