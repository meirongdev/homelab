    - group: ""
      kind: Service
---
# HTTPRoute: argocd.meirong.dev -> argocd-server
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: homelab-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "argocd.meirong.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
# auth.meirong.dev (ZITADEL) + notify.meirong.dev (Gotify) 路由已随其迁移到 oracle-k3s 移除
# （2026-07-06，见 cloud/oracle/manifests/base/gateway.yaml）。
