---
# Alertmanager → Gotify bridge (STAYS on homelab, monitoring ns).
# Gotify itself migrated to oracle-k3s 2026-07-06 (fault-domain separation); this bridge
# still runs beside homelab Alertmanager and pushes to https://notify.meirong.dev/message
# (public URL, now → oracle tunnel → oracle gotify), so no endpoint change was needed.
# gotify app manifest: cloud/oracle/manifests/gotify/gotify.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-gotify-bridge
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: homelab/gotify
        property: alertmanager_app_token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
  labels:
    app: alertmanager-gotify-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-gotify-bridge
  template:
    metadata:
      labels:
        app: alertmanager-gotify-bridge
    spec:
      containers:
        - name: bridge
          image: ghcr.io/druggeri/alertmanager_gotify_bridge@sha256:242441023c6a7956fc7bcdd30350a8fed38f791e703d670aa286fc0465f88b41
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GOTIFY_ENDPOINT
              value: "https://notify.meirong.dev/message"
            - name: GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-gotify-bridge
                  key: token
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: alertmanager-gotify-bridge
  ports:
    - port: 8080
      targetPort: 8080
      name: http
