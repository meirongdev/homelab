---
# Gotify — 消息推送服务
# 接收 Redpanda Connect 推送，通过 Telegram 插件转发到频道
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gotify-secret
  namespace: personal-services
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gotify-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: default-user-password
      remoteRef:
        key: homelab/gotify
        property: default_user_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gotify-data
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify
  namespace: personal-services
  labels:
    app: gotify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotify
  template:
    metadata:
      labels:
        app: gotify
    spec:
      containers:
        - name: gotify
          image: gotify/server@sha256:a3af47067ce6aad76aadf5ba32d6ddfecd1ae576a961359f039fd1831e8b7652
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "Asia/Shanghai"
            - name: GOTIFY_DEFAULTUSER_NAME
              value: "admin"
            - name: GOTIFY_DEFAULTUSER_PASS
              valueFrom:
                secretKeyRef:
                  name: gotify-secret
                  key: default-user-password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gotify-data
---
apiVersion: v1
kind: Service
metadata:
  name: gotify
  namespace: personal-services
spec:
  type: ClusterIP
  selector:
    app: gotify
  ports:
    - port: 80
      targetPort: 80
      name: http
---
# Alertmanager → Gotify bridge：把 Alertmanager webhook 格式转换成 Gotify 消息
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-gotify-bridge
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: homelab/gotify
        property: alertmanager_app_token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
  labels:
    app: alertmanager-gotify-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-gotify-bridge
  template:
    metadata:
      labels:
        app: alertmanager-gotify-bridge
    spec:
      containers:
        - name: bridge
          image: ghcr.io/druggeri/alertmanager_gotify_bridge@sha256:242441023c6a7956fc7bcdd30350a8fed38f791e703d670aa286fc0465f88b41
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GOTIFY_ENDPOINT
              value: "https://notify.meirong.dev/message"
            - name: GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-gotify-bridge
                  key: token
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: alertmanager-gotify-bridge
  ports:
    - port: 8080
      targetPort: 8080
      name: http
