---
# AlertManager → Gotify 路由。bridge 的 Deployment/Service/ExternalSecret 在
# gotify.yaml（personal-services App 拥有）——不要在此重复定义，两个 App 会争抢同名资源。
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: gotify
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
spec:
  route:
    receiver: gotify-default
    groupBy: ["alertname", "cluster", "severity"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    # 只接 critical|warning。之前无过滤时本路由匹配一切告警（matcherStrategy=None
    # + 顶层路由无 matcher）→ Watchdog/severity=none 每 4h 推一条 gotify。
    # info 由 InfoInhibitor 抑制，none（Watchdog 等）落回静态配置的 null。
    matchers:
      - name: severity
        matchType: "=~"
        value: "critical|warning"
    routes:
      # KubeletDown on oracle-k3s is a known false positive (external cluster,
      # kubelet not scraped directly). Suppress both the default and critical path.
      - receiver: "null"
        matchers:
          - name: alertname
            value: KubeletDown
          - name: cluster
            value: oracle-k3s
      # Critical alerts → higher priority Gotify push, repeat every 30m
      - receiver: gotify-critical
        matchers:
          - name: severity
            value: critical
        groupWait: 10s
        repeatInterval: 30m
        continue: true
  receivers:
    - name: "null"
    - name: gotify-default
      webhookConfigs:
        - url: http://alertmanager-gotify-bridge.monitoring.svc.cluster.local:8080/gotify_webhook
          sendResolved: true
    - name: gotify-critical
      webhookConfigs:
        - url: http://alertmanager-gotify-bridge.monitoring.svc.cluster.local:8080/gotify_webhook?priority=8
          sendResolved: true
