---
# AlertManager → Telegram 路由(homelab)。
# 2026-07-18: 从 Gotify bridge(druggeri/alertmanager_gotify_bridge)换成 Alertmanager
# 原生 telegramConfigs。原 bridge 有 `concurrent map writes` 崩溃 bug(全局无锁 metrics
# map,两个并发 webhook 即 fatal),且上游无维护、无修复镜像。Telegram 原生投递 = 零中间
# 桥、无并发崩溃、无版本绑定构建。详见 decisions/alerting-telegram-migration.md。
# 投到群 MatthewDaily 的「🚨 Homelab 告警」forum topic(chatID -1003981213530 +
# messageThreadID 2)。bot token: Vault secret/homelab/telegram → ESO
# (k8s/helm/manifests/alertmanager-telegram-secret.yaml)→ k8s Secret
# monitoring/alertmanager-telegram key=bot-token。
# Gotify 本体已于 2026-07 彻底下线(不再是"仍服务 Falco"——Falco 也已迁到原生
# Telegram output,见 falco.yaml + decisions/alerting-telegram-migration.md)。
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: telegram
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
spec:
  route:
    receiver: telegram
    groupBy: ["alertname", "cluster", "severity"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    # 只接 critical|warning。info 由 InfoInhibitor 抑制,none(Watchdog 等)落回静态 null。
    matchers:
      - name: severity
        matchType: "=~"
        value: "critical|warning"
    routes:
      # KubeletDown on oracle-k3s 是已知误报(外部集群,kubelet 未被直抓)。丢弃。
      - receiver: "null"
        matchers:
          - name: alertname
            value: KubeletDown
          - name: cluster
            value: oracle-k3s
      # Critical → 更快重复(30m vs 4h)。同一 telegram 接收器,模板按 severity 标记
      # 🆘/⚠️(Telegram 无 Gotify 那种数字优先级,用 emoji + 更快 repeat 区分紧急度)。
      - receiver: telegram
        matchers:
          - name: severity
            value: critical
        groupWait: 10s
        repeatInterval: 30m
  receivers:
    - name: "null"
    - name: telegram
      telegramConfigs:
        - botToken:
            name: alertmanager-telegram
            key: bot-token
          # 群组 MatthewDaily(超级群/forum),告警投到「🚨 Homelab 告警」话题(thread 2)。
          # 私聊 chatID(1982853512)已弃用;群 ID 为负 int64。
          chatID: -1003981213530
          messageThreadID: 2
          parseMode: HTML
          sendResolved: true
          # 标题行按状态/严重度标 emoji + 加粗;正文列出各 alert 的 summary/description。
          # 本集群告警文本为中文散文 + 反引号,无 <>& → HTML 安全。
          message: |-
            {{ if eq .Status "resolved" }}✅ <b>RESOLVED</b>{{ else if eq .CommonLabels.severity "critical" }}🆘 <b>CRITICAL</b>{{ else }}⚠️ <b>WARNING</b>{{ end }} · <b>{{ .CommonLabels.alertname }}</b>{{ if .CommonLabels.cluster }} @ {{ .CommonLabels.cluster }}{{ end }}
            {{ range .Alerts }}
            ▸ {{ .Annotations.summary }}{{ if .Annotations.description }}
            {{ .Annotations.description }}{{ end }}
            {{ end }}

---
# Dead-man's switch: routes the Watchdog alert to Uptime Kuma Push monitor on oracle-k3s.
# Homelab Alertmanager fires Watchdog → webhook → status.meirong.dev/api/push/... → Uptime Kuma.
# If homelab goes down, pushes stop → Uptime Kuma marks DOWN → Telegram fires (oracle side).
# See cloud/oracle/manifests/uptime-kuma/provisioner.yaml Push monitor definition.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: watchdog
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
spec:
  route:
    receiver: watchdog-webhook
    groupWait: 0s
    groupInterval: 1m
    repeatInterval: 30s
    matchers:
      - name: alertname
        value: Watchdog
  receivers:
    - name: watchdog-webhook
      webhookConfigs:
        # Push URL matching the token defined in the provisioner script.
        - url: "https://status.meirong.dev/api/push/alertmanager-watchdog-homelab?status=up&msg=OK&ping="
