---
# Bridge translates AlertManager webhook payloads → Gotify /message API.
# Upstream: https://github.com/DRuggeri/alertmanager_gotify_bridge
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
  labels:
    app: alertmanager-gotify-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-gotify-bridge
  template:
    metadata:
      labels:
        app: alertmanager-gotify-bridge
    spec:
      containers:
        - name: bridge
          image: druggeri/alertmanager_gotify_bridge:2.3.2
          args:
            - --bind_address=:8080
            - --gotify_endpoint=http://gotify.personal-services.svc.cluster.local/message
          env:
            - name: GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-gotify-token
                  key: token
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-gotify-bridge
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: alertmanager-gotify-bridge
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
# Allow AlertManager (in same namespace) to reach gotify.personal-services
# through the Gateway API. Bridge is sidecar-free so we need a ReferenceGrant-free path.
# (Not applicable here — direct svc DNS works cluster-wide; ReferenceGrant only gates
# gateway.networking.k8s.io/HTTPRoute, which we do not use for internal traffic.)
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: gotify
  namespace: monitoring
  labels:
    alertmanagerConfig: homelab
spec:
  route:
    receiver: gotify-default
    groupBy: ["alertname", "cluster", "severity"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      - receiver: gotify-critical
        matchers:
          - name: severity
            value: critical
        groupWait: 10s
        repeatInterval: 30m
        continue: true
  receivers:
    - name: gotify-default
      webhookConfigs:
        - url: http://alertmanager-gotify-bridge.monitoring.svc.cluster.local:8080/gotify_webhook
          sendResolved: true
    - name: gotify-critical
      webhookConfigs:
        - url: http://alertmanager-gotify-bridge.monitoring.svc.cluster.local:8080/gotify_webhook?priority=8
          sendResolved: true
