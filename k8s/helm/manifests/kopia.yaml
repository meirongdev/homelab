---
apiVersion: v1
kind: Namespace
metadata:
  name: kopia
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-secret
  namespace: kopia
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kopia-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/homelab/kopia
        property: password
    - secretKey: repo-password
      remoteRef:
        key: secret/homelab/kopia
        property: repo-password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kopia-repository
  namespace: kopia
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kopia-config
  namespace: kopia
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-client
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopia
  namespace: kopia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kopia
  template:
    metadata:
      labels:
        app: kopia
    spec:
      initContainers:
        - name: kopia-init
          image: kopia/kopia@sha256:bd6a449c263465c388339c0637dcd25562e99dcdde286c9d51ade81e138bbf2c
          command:
            - sh
            - -c
            - |
              if [ ! -f /app/config/repository.config ]; then
                echo "Initializing Kopia repository..."
                KOPIA_PASSWORD="$(KOPIA_REPO_PASSWORD)" kopia repository create filesystem \
                  --path=/repository \
                  --config-file=/app/config/repository.config \
                  --cache-directory=/app/cache
                echo "Repository initialized."
              else
                echo "Repository already initialized, skipping."
              fi
          env:
            - name: KOPIA_REPO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kopia-secret
                  key: repo-password
          volumeMounts:
            - name: repository
              mountPath: /repository
            - name: config
              mountPath: /app/config
            - name: cache
              mountPath: /app/cache
      containers:
        - name: kopia
          image: kopia/kopia@sha256:bd6a449c263465c388339c0637dcd25562e99dcdde286c9d51ade81e138bbf2c
          # TLS（非 --insecure）：kopia CLI/备份客户端强制 https，故 gRPC 必须走 TLS（否则 oracle 备份连不上）。
          # 自签 cert 落在持久化 config PVC：首次无 cert 才 --tls-generate-cert 生成，重启复用同一 cert
          # → fingerprint 稳定（客户端 --server-cert-fingerprint 不会失效）。首次生成的 fingerprint 见
          # 启动日志（kubectl logs deploy/kopia -n kopia | grep -i fingerprint），回填 Vault server_fingerprint。
          command:
            - /bin/sh
            - -c
            - |
              CERT=/app/config/tls.cert
              KEY=/app/config/tls.key
              GEN=""
              if [ ! -f "$CERT" ]; then GEN="--tls-generate-cert"; fi
              exec kopia server start \
                $GEN \
                --tls-cert-file="$CERT" \
                --tls-key-file="$KEY" \
                --address=0.0.0.0:51515 \
                --config-file=/app/config/repository.config \
                --cache-directory=/app/cache \
                --server-username=admin \
                --server-password="$KOPIA_SERVER_PASSWORD" \
                --server-control-username=admin \
                --server-control-password="$KOPIA_SERVER_PASSWORD"
          env:
            - name: KOPIA_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kopia-secret
                  key: password
            - name: KOPIA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kopia-secret
                  key: repo-password
          ports:
            - containerPort: 51515
          livenessProbe:
            tcpSocket:
              port: 51515
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 51515
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 384Mi
          volumeMounts:
            - name: repository
              mountPath: /repository
            - name: config
              mountPath: /app/config
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: repository
          persistentVolumeClaim:
            claimName: kopia-repository
        - name: config
          persistentVolumeClaim:
            claimName: kopia-config
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kopia
  namespace: kopia
spec:
  type: NodePort
  selector:
    app: kopia
  ports:
    - port: 51515
      targetPort: 51515
      nodePort: 31515
      # kopia 后端现为 TLS（见 Deployment）。appProtocol: https 让 Cilium Gateway/Envoy 对后端
      # 发起 TLS（需 Cilium gatewayAPI.enableAppProtocol=true，已开）——web UI 经 gateway 走
      # HTTP-in / TLS-out 到 kopia。自签 cert：Envoy 默认不校验上游证书（等价旧 Traefik 的
      # insecureSkipVerify）。⚠️ 部署后务必验证 backup.meirong.dev 可访问；若断见 runbook 回退/BackendTLSPolicy。
      appProtocol: https
