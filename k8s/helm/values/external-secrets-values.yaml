installCRDs: true

webhook:
  port: 9443

# 如果需要 Prometheus 监控
metrics:
  service:
    enabled: true

# ServiceMonitor so kube-prometheus-stack scrapes ESO controller metrics.
# additionalLabels.release MUST equal the Helm release name (kube-prometheus-stack),
# else the operator's serviceMonitorSelector ignores it and nothing is scraped.
serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
