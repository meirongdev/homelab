# Falco — 运行时威胁检测（oracle-k3s）
# Chart: falcosecurity/falco  (仓库 https://falcosecurity.github.io/charts)
# 由 ArgoCD Helm App 部署到 **oracle 集群**（argocd/applications/falco.yaml），dest ns: falco
#
# 为何 oracle 选 Falco（而非 Tetragon）：规则库开箱即用、社区规则成熟；oracle VM CPU 余量大，
# 能承受用户态逐 syscall 处理。homelab 则用更省 CPU 的 Tetragon（见 values/tetragon.yaml）。
#
# 检测事件双出口：
#   1) Falco JSON → stdout → oracle OTel Collector → homelab Loki（always-on 取证线索，零依赖）
#   2) Falcosidekick → Telegram（主动推送告警，2026-07 起原生 telegram output，
#      不再经 Gotify——已下线）—— 併入群 MatthewDaily「🚨 Homelab 告警」话题
#      token 未配好不影响 (1)；falcosidekick 仅 Telegram 推送失败，Falco 检测本身照常。

# CO-RE modern eBPF 驱动：无需内核模块/头文件，适配托管 VM（recent kernel）。
driver:
  kind: modern_ebpf

# Falco 引擎
falco:
  json_output: true          # 结构化告警（利于 Loki 查询）
  json_include_output_property: true
  priority: notice           # 上报 notice 及以上

# 应用白名单例外：backup ns 的 restic 备份容器（alpine）运行时 apk 装 postgresql-client，
# 再执行 pg_dump/pg_dumpall 备份 CNPG —— 触发 "Drop and execute new binary in container"；
# 建 postgres 用户时 adduser 把 /etc/shadow 硬链到 /etc/shadow-（adduser 正常行为）——
# 触发 "Create Hardlink Over Sensitive Files"。两者均为该 ns 的已知误报，按 ns + 进程名精确放行。
# 用法：同名 rule + override.condition=append 附加排除条件（Falco 0.44 已弃用旧的 append:true）。
customRules:
  override-backup.yaml: |-
    - rule: Drop and execute new binary in container
      condition: and not (k8s.ns.name = "backup" and proc.name in (find, restic, ssh, pg_dump, pg_dumpall))
      override:
        condition: append
    - rule: Create Hardlink Over Sensitive Files
      condition: and not (k8s.ns.name = "backup" and proc.name = adduser)
      override:
        condition: append
# Falco DaemonSet 资源（oracle 有余量，但仍设上限）
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Falcosidekick：把告警扇出到 Telegram（原生 output，chatid/messagethreadid 走
# 明文 values——非敏感；existingSecret 只覆盖 TELEGRAM_TOKEN 一个键，与其余
# telegram.* 明文键叠加生效，机制同旧 gotify 配置，见 falcosidekick chart
# secrets.yaml 模板：envFrom 两个 secretRef 叠加，后者覆盖同名键）
falcosidekick:
  enabled: true
  replicaCount: 1
  # chart 默认镜像 2.32.0 根本不支持 Telegram message_thread_id（config.go 未把该键
  # 注册进 viper，无论环境变量叫什么都不会写进 payload，告警只能落到群"General"话题）。
  # 2.33+ 才修好；锁到已发布版 2.34.1（已本地实测 payload 含 message_thread_id）。
  image:
    tag: "2.34.1"
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 200m, memory: 128Mi }
  config:
    # 仅推 warning 及以上，降噪；併入 Telegram 群 MatthewDaily「🚨 Homelab 告警」话题
    telegram:
      chatid: "-1003981213530"
      # ⚠️ chart 把此键渲染成环境变量 TELEGRAM_MESSAGE_THREAD_ID（带下划线），但 falcosidekick
      #    用 viper AutomaticEnv 读的是 TELEGRAM_MESSAGETHREADID（无下划线）—— chart 键名是
      #    upstream bug，读不到。真正生效的话题 ID 由下方 extraEnv 注入；此行保留仅作意图记录。
      messagethreadid: "2"
      minimumpriority: "warning"
      # ⚠️ token 不写明文；经 ESO 注入的 secret(falcosidekick-telegram) 的 TELEGRAM_TOKEN 环境变量提供。
    # existingSecret：其 key 作为大写环境变量被 falcosidekick 读取（TELEGRAM_TOKEN）。
    existingSecret: "falcosidekick-telegram"
    # 绕开上面的 chart 键名 bug：直接注入 falcosidekick 实际读取的 TELEGRAM_MESSAGETHREADID，
    # 告警才会进「🚨 Homelab 告警」话题（thread_id=2）。extraEnv 走容器 env，优先级高于 envFrom。
    extraEnv:
      - name: TELEGRAM_MESSAGETHREADID
        value: "2"
