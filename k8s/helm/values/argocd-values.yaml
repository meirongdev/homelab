# ArgoCD values for homelab K3s (single-node)
# 取代旧的 stock manifest 部署（argo-cd/stable/manifests/install.yaml）。
# Chart: argo/argo-cd (https://github.com/argoproj/argo-helm)
#
# 部署：cd k8s/helm && just deploy-argocd
# 升级：编辑本文件后重跑 just deploy-argocd

global:
  domain: argocd.meirong.dev

# Cloudflare Tunnel + Cilium Gateway 经 HTTP 路径转发，禁用 ArgoCD 自带 TLS。
# 等价于旧的 argocd/install/argocd-cm-patch.yaml。
configs:
  params:
    server.insecure: "true"
  # Authz for SSO logins. policy.default grants every authenticated ZITADEL identity
  # full admin — acceptable here because ZITADEL is a single-user, locked-down IdP
  # (no self-registration; GitHub federation email-linked to one pre-existing user).
  # The local `admin` account is unaffected. To tighten later: drop policy.default
  # and map a specific subject, e.g.
  #   policy.csv: |
  #     g, <zitadel-sub-or-email>, role:admin
  #   scopes: '[email]'
  rbac:
    policy.default: role:admin
  # 允许通过 cm.url 让 OAuth/回调走外部 URL（即使没用 SSO 也保留 URL 自洽）
  cm:
    url: https://argocd.meirong.dev
    # --- ZITADEL native OIDC SSO (no dex). Local `admin` account stays enabled as a
    # fallback (no lockout). clientID/clientSecret are pulled from the ESO-managed
    # secret `argocd-oidc` (labeled app.kubernetes.io/part-of=argocd) via ArgoCD's
    # $<secret>:<key> value reference. Client provisioned by
    # zitadel/scripts/configure-oidc-app.sh (app "argocd", redirects
    # https://argocd.meirong.dev/auth/callback + http://localhost:8085/auth/callback).
    oidc.config: |
      name: ZITADEL
      issuer: https://auth.meirong.dev
      clientID: $argocd-oidc:oidc.clientID
      clientSecret: $argocd-oidc:oidc.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
    # ESO 的 ExternalSecret CRD 给 remoteRef 自动填默认值，ArgoCD 的 SSA diff 会
    # 把这视作 drift。这里忽略掉 ESO 自己默认的字段，避免每次写新 ExternalSecret
    # 都得手动复制 conversionStrategy/decodingStrategy/metadataPolicy。
    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
    # Cilium Gateway API health: a Gateway is Healthy once Programmed (or
    # Accepted on the cilium / cilium-nodeport classes — neither homelab nor
    # oracle-k3s has an external LB, so Programmed stays False / AddressNotAssigned
    # forever and Accepted=True is the real steady state). Without this, the
    # gateway Applications sit Progressing/Degraded (and PostSync-hook syncs hang
    # waiting for Gateway health). Previously applied imperatively to argocd-cm;
    # folded into values so Helm adoption doesn't drop it.
    resource.customizations.health.gateway.networking.k8s.io_Gateway: |
      hs = {}
      local accepted = false
      local programmed = false

      if obj.status ~= nil and obj.status.conditions ~= nil then
        for _, condition in ipairs(obj.status.conditions) do
          if condition.type == "Accepted" and condition.status == "True" then
            accepted = true
          end
          if condition.type == "Programmed" and condition.status == "True" then
            programmed = true
          end
        end
      end

      if programmed then
        hs.status = "Healthy"
        hs.message = "Gateway is programmed"
        return hs
      end

      if accepted and obj.spec ~= nil and (obj.spec.gatewayClassName == "cilium-nodeport" or obj.spec.gatewayClassName == "cilium") then
        hs.status = "Healthy"
        hs.message = "Gateway accepted (Cilium, no external LB on this cluster)"
        return hs
      end

      if accepted then
        hs.status = "Progressing"
        hs.message = "Gateway accepted but still waiting to be programmed"
        return hs
      end

      hs.status = "Degraded"
      hs.message = "Gateway has not been accepted by the controller"
      return hs

# CRDs 已由原始 stock-manifest 安装且 ArgoCD 正在使用（Application/AppProject/
# ApplicationSet）。收编进 Helm 时不让 chart 接管 CRD，避免对正在被 CR 使用的
# CRD 做有风险的 ownership 变更；CRD 继续独立存在，Applications 不受影响。
crds:
  install: false
  keep: true

# --- 禁用未使用的可选组件 ---
# Reason: SSO 已下线（CLAUDE.md），仓库内无 ApplicationSet CR，无 notifier 配置
dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: false

# --- 资源声明 ---
controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # Gate startup on real DNS resolution of the git host. On a fresh pod,
  # Cilium needs a moment to program the endpoint's eBPF datapath; ArgoCD
  # otherwise fires its first git fetch inside that sub-second window and the
  # lookup fails ("no such host" / "server misbehaving"), leaving Applications
  # stuck in ComparisonError until a later retry. Looping until github.com
  # actually resolves removes the race (busybox nslookup exits 0 only on a
  # real answer). Cap at 120s so a genuine internet outage doesn't block the
  # pod forever — ArgoCD's own retry then takes over.
  initContainers:
    - name: wait-for-dns
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          i=0
          until nslookup github.com >/dev/null 2>&1; do
            i=$((i+1))
            if [ "$i" -ge 120 ]; then
              echo "[wait-for-dns] github.com still unresolvable after 120s; starting anyway"
              exit 0
            fi
            echo "[wait-for-dns] waiting for github.com to resolve..."
            sleep 1
          done
          echo "[wait-for-dns] github.com resolves; starting repo-server"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi

server:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 96Mi
