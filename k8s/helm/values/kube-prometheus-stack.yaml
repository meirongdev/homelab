# Prometheus + Grafana + Alertmanager
grafana:
  enabled: true
  admin:
    existingSecret: "grafana-admin-credentials" # ✅ 使用预先创建的 Secret
    userKey: ""              # ✅ 显式设置为空，覆盖默认值
    passwordKey: "admin-password"

  # Dashboard sidecar 组织化（让面板列表不再平铺混乱）
  #  - multicluster.global: 给 chart 内置 mixin 面板注入 $cluster 选择器，
  #    避免 homelab/oracle-k3s/dgx-spark 指标在同一张图里被叠加（指标均带 cluster 标签）
  #  - folderAnnotation + provider.foldersFromFilesStructure: 按 ConfigMap 的
  #    grafana_folder 注解分文件夹（sidecar 写入 /tmp/dashboards/<注解值>/）
  #  - annotations.grafana_folder: chart 自带的内置面板统一归档，避免污染顶层
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      multicluster:
        global:
          enabled: true
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
      annotations:
        grafana_folder: "Kubernetes Built-in"

  # ZITADEL native OIDC SSO (generic_oauth). Local admin login (admin/ existingSecret
  # above) stays enabled as a fallback — no lockout risk. Client id/secret come from
  # the same grafana-admin-credentials Secret (ESO ← Vault secret/homelab/grafana),
  # injected as env so Grafana's GF_AUTH_GENERIC_OAUTH_* overrides win over grafana.ini.
  # Client provisioned by zitadel/scripts/configure-oidc-app.sh (app "grafana",
  # redirect https://grafana.meirong.dev/login/generic_oauth).
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-admin-credentials
        key: oauth-client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-admin-credentials
        key: oauth-client-secret

  grafana.ini:
    # 启动稳定性（2026-07-04 修 CrashLoop）：关闭启动期对 grafana.com 的联网调用。
    #   现象：grafana 容器每次启动卡在 "Loading plugins..." ~159s（零日志），之后被
    #   liveness 探针 kill，形成自维持 CrashLoop（持续 8 天）。plugins 目录里的 4 个 app
    #   插件（lokiexplore/exploretraces/metricsdrilldown/pyroscope）已随镜像装在 NFS PVC
    #   上，本地加载即可；Grafana 13 默认在启动时对它们做 preinstall + 更新检查（联网
    #   grafana.com）。Pod 内 grafana.com 只解析到 IPv6、集群无 IPv6 出网 → dial 长挂起，
    #   拖过 liveness 死线。关掉这两项后走纯本地插件，启动不再联网。
    plugins:
      check_for_plugin_updates: false
      preinstall_disabled: true
    dashboards:
      # 登录后默认落到多集群总览（sidecar 把该 ConfigMap 写入 Platform 文件夹）
      default_home_dashboard_path: /tmp/dashboards/Platform/multicluster-overview.json
    server:
      # Required so Grafana builds the OAuth callback as https://grafana.meirong.dev/...
      # (it sits behind the Cloudflare Tunnel → Cilium Gateway, not localhost).
      root_url: https://grafana.meirong.dev
    auth.generic_oauth:
      enabled: true
      name: ZITADEL
      # client_id / client_secret injected via env (GF_AUTH_GENERIC_OAUTH_CLIENT_ID/SECRET).
      scopes: "openid email profile"
      auth_url: https://auth.meirong.dev/oauth/v2/authorize
      token_url: https://auth.meirong.dev/oauth/v2/token
      api_url: https://auth.meirong.dev/oidc/v1/userinfo
      use_pkce: true
      allow_sign_up: true
      email_attribute_path: email
      login_attribute_path: preferred_username
      name_attribute_path: name
      # Single-user homelab gated by ZITADEL (one user + locked-down GitHub federation),
      # so any ZITADEL-authenticated identity is granted Admin.
      role_attribute_path: "'Admin'"
      role_attribute_strict: false

  # 启动宽限窗口（2026-07-04）：本 chart 的 grafana 主容器模板不暴露 startupProbe，
  #   故用 livenessProbe 的 initialDelaySeconds 给启动留足宽限。被热节流的 5600H 笔记本
  #   + NFS home 上，Grafana 13 unified-storage/插件加载启动本就偏慢；默认 liveness
  #   (initialDelay 60 + failureThreshold 10 × period 10 = 160s) 会在启动完成前把它 kill。
  #   放宽到 initialDelay 120 + 30 × period 15 ≈ 570s 宽限；首次就绪后仍做存活检测。
  #   （与上面关闭启动联网互补：联网关闭后启动应很快，此探针为安全网。）
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 30
    failureThreshold: 30
    successThreshold: 1

  # 持久化存储
  # ⚠️ 必须用 local-path（节点本地盘），不能用 nfs-client：Grafana 的 sqlite DB 走
  #   POSIX 字节锁(fcntl)+ 同步小写，NFS 锁(NLM)对这种模式病态地慢/挂起（实测一条 DB
  #   迁移 3m48s、下一步再挂 9+ 分钟）。2026-07-04 曾因此 CrashLoop 8 天：每次启动到
  #   "Loading plugins"（写插件状态到 DB）就卡在 NFS 上的 DB 写，被 liveness 探针 kill。
  #   （prometheus/loki 是大块顺序写，同一 NFS 上无碍，故只有 grafana 受影响。）
  #   sqlite-on-NFS 是教科书级反模式——DB 放本地盘即根治。dashboards/datasources 全部由
  #   GitOps（ConfigMap + values）声明重建，本地盘丢数据风险可接受。
  persistence:
    enabled: true
    storageClassName: local-path
    size: 1Gi

  # 资源限制
  resources:
    requests:
      cpu: 100m                 # ✅ 从默认值降低
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # 给 Loki/Tempo 赋稳定 uid 以支持 trace↔log↔metric 关联。
  # 关键坑（2026-06-15）：本集群 Grafana 用 NFS PVC 持久化，库里已有按 name 自动生成
  # 随机 uid 的 Loki/Tempo；直接在 provisioning 里改它们的 uid 会让 Grafana 12.x 报
  # "Datasource provisioning error: data source not found" 并整个 Pod CrashLoop。
  # 解法：先用 deleteDatasources 按 name 删旧记录，再以稳定 uid 重建（Grafana 官方对
  # “给已有数据源赋 uid”的标准做法）。删除-重建用同一 uid，幂等、对引用方无副作用。
  deleteDatasources:
    - name: Loki
      orgId: 1
    - name: Tempo
      orgId: 1
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
      jsonData:
        # 不在 Loki 侧配指向 Tempo 的 datasourceUid：Loki 在本文件中先于 Tempo 创建，
        # 指向 Tempo 属前向引用，provisioning 时 Tempo 尚未建立 → 仍会 not found。
        # 故此处仅提取 TraceID 字段；logs→trace 跳转后续用 Correlations 单独加。
        derivedFields:
          - name: TraceID
            matcherRegex: "traceID=(\\w+)"
    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy
      isDefault: false
      jsonData:
        # Tempo 在 Loki/Prometheus 之后创建，以下 datasourceUid 均为后向引用，可安全解析。
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: '-1h'
          spanEndTimeShift: '1h'
          filterByTraceID: true
          filterBySpanID: false
          tags:
            - key: service.name
              value: service_name
            - key: service.namespace
              value: service_namespace
            - key: k8s.pod.name
              value: k8s_pod_name
        tracesToMetrics:
          datasourceUid: prometheus
          tags:
            - key: service.name
              value: service
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true

prometheus:
  prometheusSpec:
    retention: 7d
    # 启动宽限安全网（2026-07-04）：TSDB 已迁到 local-path（见下 storageSpec），启动重放走
    #   本地盘、很快，operator 默认 ~900s 窗口本已够用；保留 1800s 仅作 WAL 增大后的余量。
    #   历史（NFS 上曾因 head/WAL 读被慢 NFS 拖过 900s 死线 → CrashLoop，故迁 local-path）。
    maximumStartupDurationSeconds: 1800
    externalLabels:
      cluster: homelab

    # 给所有本地 scrape 的指标打上 cluster=homelab 标签
    # externalLabels 仅在 remote_write/federation 时附加，本地查询不生效
    # scrapeClasses 是 Prometheus Operator v0.70+ 支持的全局 relabel 方式
    scrapeClasses:
      - name: default
        default: true
        relabelings:
          - targetLabel: cluster
            replacement: homelab
            action: replace
    
    # 持久化存储
    # ⚠️ local-path（节点本地盘），不用 nfs-client：TSDB 在 NFS 上时，重启的 head/WAL 读会
    #   卡在慢/wedge 的 NFS 客户端上（线程 D 状态、进程零进展），拖过启动探针 → CrashLoop
    #   （2026-07-04 事故）。本地盘无此问题、秒起。metrics 是 P2 数据、可重建，本地盘丢数据
    #   风险可接受。⚠️ 改此字段需删旧 STS+PVC 让 operator 以新 SC 重建（volumeClaimTemplate 不可变）。
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    
    # 资源限制
    # memory limit 1Gi→1.5Gi（2026-07-04）：head/WAL 回放峰值内存曾逼近 1Gi（实测 694Mi 仍在涨）
    #   有 OOM 风险；节点约 2.3Gi 余量，limit 抬到 1.5Gi 给回放留头（request 不变，调度无碍）。
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1536Mi


    # 添加额外的抓取配置
    additionalScrapeConfigs:
      - job_name: 'node-exporter-metal-nodes'
        scrape_interval: 15s
        static_configs:
          - targets:
              - 192.168.50.106:9100  # storage-node-1
            labels:
              cluster: homelab
              nodename: storage-106
          - targets:
              - 192.168.50.4:9100    # proxmox-node-1
            labels:
              cluster: homelab
              nodename: proxmox-pve

      # Storage server (106) SMART disk health — smartctl_exporter (:9633, root).
      # Deployed via: cd proxmox/ansible && just node-exporter
      - job_name: 'smartctl-storage-106'
        scrape_interval: 120s
        static_configs:
          - targets:
              - 192.168.50.106:9633
            labels:
              cluster: homelab
              nodename: storage-106

      # Proxmox host (pve) SMART disk health — smartctl_exporter (:9633, root).
      # Deployed via: cd proxmox/ansible && just node-exporter (Play 2, pve-1).
      - job_name: 'smartctl-proxmox-pve'
        scrape_interval: 120s
        static_configs:
          - targets:
              - 192.168.50.4:9633
            labels:
              cluster: homelab
              nodename: proxmox-pve

      # DGX Spark cluster (2× GB10) — host metrics via node_exporter (docker, :9100),
      # scraped over Tailscale. node_exporter deployed from the nv-dgx-spark repo:
      #   make node-exporter-deploy  (playbooks/node-exporter-deploy.yml)
      # Tailnet ACL already allows tag:homelab → *:* so the Prometheus pod can reach 100.x.
      # additionalScrapeConfigs are injected verbatim (scrapeClasses don't relabel them),
      # so cluster/nodename are set explicitly here per target.
      - job_name: 'node-exporter-dgx-spark'
        scrape_interval: 15s
        static_configs:
          - targets:
              - 100.97.87.120:9100   # dgx-spark-1 (V4-Flash head)
            labels:
              cluster: dgx-spark
              nodename: dgx-spark-1
          - targets:
              - 100.67.164.92:9100   # dgx-spark-2 (V4-Flash TP worker)
            labels:
              cluster: dgx-spark
              nodename: dgx-spark-2

      # DGX Spark SMART disk health — smartctl_exporter (host systemd service, :9633,
      # arm64 binary — quay image is amd64-only), scraped over Tailscale. Deployed from
      # the nv-dgx-spark repo: make smartctl-exporter-deploy
      # nodename labels match the node-exporter-dgx-spark targets so the dashboard's
      # $nodename dropdown selects both node + SMART metrics for the same host.
      - job_name: 'smartctl-dgx-spark'
        scrape_interval: 120s
        static_configs:
          - targets:
              - 100.97.87.120:9633   # dgx-spark-1
            labels:
              cluster: dgx-spark
              nodename: dgx-spark-1
          - targets:
              - 100.67.164.92:9633   # dgx-spark-2
            labels:
              cluster: dgx-spark
              nodename: dgx-spark-2

      # MacBook Pro (Apple Silicon) — personal laptop host metrics via node_exporter,
      # installed as a LaunchAgent (~/Library/LaunchAgents/com.prometheus.node_exporter.plist,
      # binary ~/.local/bin/node_exporter, :9100), scraped over Tailscale. Same verbatim-inject
      # pattern as dgx-spark, so cluster/nodename are set per target here.
      # NOTE: it's a laptop — the target (and a TargetDown warning) is expected to flap on sleep/logout.
      - job_name: 'node-exporter-macbook'
        scrape_interval: 15s
        static_configs:
          - targets:
              - 100.89.15.120:9100   # Matthews-MacBook-Pro (Tailscale)
            labels:
              cluster: macbook
              nodename: macbook-pro

      # oracle-k3s 指标均为 push 模式（OTel Collector → prometheusremotewrite）
      # 包含: node-exporter, kube-state-metrics, cloudflared, traefik
      # See: cloud/oracle/manifests/monitoring/otel-collector.yaml

    # Enable OTLP receiver so OTel Collectors can push metrics directly
    enableFeatures:
      - otlp-write-receiver

    # Web endpoints:
    #   /api/v1/otlp  — homelab OTel Collector pushes metrics (OTLP)
    #   /api/v1/write — oracle prometheus-agent + oracle OTel prometheusremotewrite
    additionalArgs:
      - name: web.enable-otlp-receiver
      - name: web.enable-remote-write-receiver

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - equal: [namespace, alertname]
        source_matchers: [severity = critical]
        target_matchers: [severity =~ "warning|info"]
      - equal: [namespace, alertname]
        source_matchers: [severity = warning]
        target_matchers: [severity = info]
      - equal: [namespace]
        source_matchers: [alertname = InfoInhibitor]
        target_matchers: [severity = info]
      - target_matchers: [alertname = InfoInhibitor]
    route:
      group_by: [namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
      routes:
        - matchers: [alertname = "Watchdog"]
          receiver: "null"
        # KubeletDown 对 oracle-k3s 是误报：oracle 为外部集群、指标走 OTel remote-write，
        # kube-prometheus-stack 的 KubeletDown 规则直抓不到 kubelet → 误触发。节点实测 Ready。
        # 丢弃 oracle 的该告警（homelab 的 KubeletDown 仍正常路由）。
        - matchers: [alertname = "KubeletDown", cluster = "oracle-k3s"]
          receiver: "null"
        - matchers: [severity =~ "critical|warning"]
          receiver: gotify
    receivers:
      - name: "null"
      - name: gotify
        webhook_configs:
          - url: "http://alertmanager-gotify-bridge.monitoring.svc:8080/gotify_webhook"
            send_resolved: true
    templates:
      - /etc/alertmanager/config/*.tmpl
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m             
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# 默认会安装很多 ServiceMonitors，如果资源有限可以禁用一些
kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  operatingSystem:
    aix:
      enabled: false       # AIX 节点，不适用
    darwin:
      enabled: false       # macOS 节点，不适用

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

kubeProxy:
  enabled: false             # Cilium kube-proxy replacement，无 kube-proxy 指标

# 如果不需要监控 etcd、scheduler 等控制平面组件，可以禁用
kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeControllerManager:
  enabled: false