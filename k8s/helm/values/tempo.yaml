tempo:
  # ⚠️ chart(grafana/tempo)的镜像键是扁平的 tempo.repository/tempo.tag,没有
  # image: 层级——旧写法 tempo.image.tag 是无效键,恰好与 chart 1.24.4 的
  # appVersion(2.9.0)相同才看似生效。
  # 2.9.2:Go 1.26.2 + grpc 1.79.3,修复 CVE-2025-68121 / CVE-2026-33186,
  # 另含 Tempo 自身的 CVE-2026-21728(搜索结果集无上限)修复。
  repository: grafana/tempo
  tag: 2.9.2
  replicas: 1
  
  # 追踪数据保留期
  retention: 168h               # ✅ 7 天

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  
  persistence:
    # local-path（2026-07-11 从 nfs-client 迁移）：trace 数据 7 天保留期，可丢
    enabled: true
    storageClassName: local-path
    size: 5Gi
  
  # 资源限制
  resources:
    requests:
      cpu: 100m               
      memory: 128Mi           
    limits:
      cpu: 300m              
      memory: 384Mi

# 启用查询前端(镜像键同样是扁平的 repository/tag,与 tempo 版本保持一致)
tempoQuery:
  enabled: true
  repository: grafana/tempo-query
  tag: 2.9.2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 96Mi

# 配置追踪接收器
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
  jaeger:
    thriftHttp:
      enabled: true
  zipkin:
    enabled: true

# Overrides — expose gRPC receiver on NodePort for cross-cluster traces
server:
  grpc:
    port: 4317
  http:
    port: 4318