tempo:
  image:
    repository: grafana/tempo
    tag: 2.9.0
  replicas: 1
  
  # 追踪数据保留期
  retention: 168h               # ✅ 7 天

  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  
  persistence:
    # local-path（2026-07-11 从 nfs-client 迁移）：trace 数据 7 天保留期，可丢
    enabled: true
    storageClassName: local-path
    size: 5Gi
  
  # 资源限制
  resources:
    requests:
      cpu: 100m               
      memory: 128Mi           
    limits:
      cpu: 300m              
      memory: 384Mi

# 启用查询前端
tempoQuery:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 96Mi

# 配置追踪接收器
traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true
  jaeger:
    thriftHttp:
      enabled: true
  zipkin:
    enabled: true

# Overrides — expose gRPC receiver on NodePort for cross-cluster traces
server:
  grpc:
    port: 4317
  http:
    port: 4318