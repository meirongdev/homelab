loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
  
  storage:
    type: filesystem
  
  compactor:
    retention_enabled: true
    working_directory: /var/loki/compactor
    delete_request_store: filesystem
    compaction_interval: 10m
    retention_delete_delay: 2h
    retention_delete_worker_count: 150

  limits_config:
    retention_period: 168h
    otlp_config:
      resource_attributes:
        attributes_config:
          - action: index_label
            attributes:
              - cluster
  
  schemaConfig:
    configs:
      - from: 2025-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# ✅ 明确指定使用 SingleBinary 模式
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  
  persistence:
    enabled: true
    # ⚠️ local-path（节点本地盘），不用 nfs-client：SingleBinary + filesystem 存储把 chunks/
    #   index/WAL 全写在此 PVC 上；在 NFS 上 ingester 写路径会超时（实测 POST /push 500
    #   DeadlineExceeded、/ready 持续超时、pod 长期 1/2），同 grafana/prometheus 的 sqlite/
    #   TSDB 之痛（NFS 小文件写+fsync）。本地盘根治。日志为 P2 可丢数据。2026-07-04 迁移。
    #   ⚠️ 改此字段需删旧 STS+PVC 让 helm 以新 SC 重建（volumeClaimTemplate 不可变）。
    storageClass: local-path
    size: 5Gi
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ✅ 禁用 chunks cache（节省 9.6GB 内存！）
chunksCache:
  enabled: false
  # 或者如果你想保留但减少内存：
  # allocatedMemory: 512  # MB，从 8192 降到 512
  # replicas: 0

# ✅ 禁用 results cache 或减少内存
resultsCache:
  enabled: false
  # 或者：
  # allocatedMemory: 256  # MB

# ✅ 减少 canary 副本数
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false # 禁用 canary, 节省资源

# ✅ 确保禁用其他模式的组件
read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

# Gateway
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# 明确禁用分布式组件（重要！）
ingester:
  replicas: 0
distributor:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
ruler:
  replicas: 0


# Promtail 已由 OTel Collector DaemonSet 替代
promtail:
  enabled: false
