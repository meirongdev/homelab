server:
  affinity: ""
  # 2026-07-16 fix: memory 256Mi→512Mi, CPU 500m→1. Vault tab 42.6% CPU throttling
  # + 5 restarts (exit 255, OOM). Raft snapshot + TLS + audit device startup spike.
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  ha:
    enabled: true
    replicas: 1
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        cluster_name = "vault-integrated-storage"
        storage "raft" {
          path    = "/vault/data"
        }

        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable = 1
        }

        service_registration "kubernetes" {}

  # 断电重启后自动解锁（密钥存储于 K8s Secret: vault/vault-auto-unseal）
  # 注意：vault-auto-unseal secret 需手动创建（见 justfile: just vault-setup-auto-unseal）
  # 断电重启后自动解锁（密钥存储于 K8s Secret: vault/vault-auto-unseal）
  postStart:
    - /bin/sh
    - -c
    - |
      export VAULT_ADDR=http://127.0.0.1:8200
      # Decide via 'vault status' EXIT CODE, not text matching:
      #   0 = unsealed, 2 = sealed, anything else = listener not up yet.
      # The previous version grepped '"sealed":true' against -format=json output,
      # but Vault pretty-prints with a space ('"sealed": true'), so the pattern
      # never matched and the hook silently exited without ever unsealing.
      # Retry up to 240s — VM cold-boot + NFS-backed Raft can take >60s to bind.
      for _ in $(seq 1 120); do
        vault status >/dev/null 2>&1; rc=$?
        [ "$rc" -eq 0 ] && exit 0   # already unsealed, nothing to do
        [ "$rc" -eq 2 ] && break    # initialized + sealed → unseal below
        sleep 2                     # rc=1 etc → not ready yet, keep waiting
      done
      vault operator unseal "$(cat /vault/userconfig/vault-auto-unseal/unseal-key)" >/dev/null 2>&1 || true
      exit 0

  extraVolumes:
    - type: secret
      name: vault-auto-unseal

  # Raft 数据迁 local-path（2026-07-06 Phase 2）：raft fsync + 启动不再依赖 NFS/Tailscale
  # （曾需 240s 重试等 NFS Raft bind）。restic 每夜 raft snapshot 备份兜底。
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path

  # 审计卷迁 local-path（2026-07-11）：原 NFS 卷实测仅 512B（审计设备从未启用），
  # 却让 vault-0 重启时硬依赖 106 在线——106 宕机 3 天事故后决定消除该依赖。
  # 若将来启用审计设备，restic 夜备的 raft snapshot 不含审计日志，需另行纳入备份。
  auditStorage:
    enabled: true
    size: 2Gi
    storageClass: local-path

ui:
  enabled: true
  serviceType: "NodePort"
  nodePort: 30820

injector:
  # 单节点：清空 chart 默认的硬 podAntiAffinity（否则滚动更新时新副本无法与旧副本同节点共存 → Pending 死锁）。
  # 与上面 server.affinity:"" 一致。webhook failurePolicy=Ignore，滚动期间不阻塞 Pod 创建。
  affinity: ""
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 96Mi
