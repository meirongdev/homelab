# Trivy Operator — 镜像 CVE / 配置审计 / RBAC / 暴露密钥 持续扫描
# Chart: aqua/trivy-operator  (仓库 https://aquasecurity.github.io/helm-charts)
# 由 ArgoCD Helm App 部署（argocd/applications/trivy-operator.yaml），dest ns: trivy-system
#
# 设计要点（单节点 5600H 笔记本，idle ~74°C，必须控 CPU）：
#   - scanJobsConcurrentLimit=1：串行扫描，杜绝热节点上的"扫描器风暴"
#   - ClientServer + builtInTrivyServer：内置长驻 Trivy server 持久化漏洞 DB（PVC），
#     避免每个扫描 Job 重新下载 ~几百 MB 的 DB（网络 + CPU 反复开销）
#   - severity=HIGH,CRITICAL + ignoreUnfixed：只报可修复的高危，降噪 + 省算力
#   - clusterComplianceEnabled=false：CIS 节点合规交给 kube-bench，避免 Trivy 重复跑 node-collector
#   - 排除系统 namespace，减少无意义扫描
# 指标经 ServiceMonitor(带 release 标签)被 kube-prometheus-stack 抓取；
# 告警在 manifests/trivy-alerts.yaml，看板在 manifests/trivy-dashboard.yaml。

# 扫描范围：空 targetNamespaces = 全集群；排除系统 ns
targetNamespaces: ""
excludeNamespaces: "kube-system,kube-public,kube-node-lease,trivy-system"

operator:
  scanJobsConcurrentLimit: 1            # 串行扫描（热节点关键）
  scanJobTTL: "1h"                      # 扫描 Job 完成 1h 后清理
  metricsFindingsEnabled: true          # 暴露 trivy_image_vulnerabilities 等 findings 指标
  vulnerabilityScannerEnabled: true
  vulnerabilityScannerScanOnlyCurrentRevisions: true   # 只扫当前 ReplicaSet，省重复
  configAuditScannerEnabled: true
  configAuditScannerScanOnlyCurrentRevisions: true
  rbacAssessmentScannerEnabled: true
  exposedSecretScannerEnabled: true     # 镜像里硬编码密钥扫描（最高信号）
  clusterComplianceEnabled: false       # CIS 节点合规交给 kube-bench
  builtInTrivyServer: true              # 内置长驻 Trivy server（共享 DB 缓存）

# operator 自身（控制器）资源
# 2026-07-16 fix: 256Mi → 512Mi. 200 restart OOM (exit 137). Trivy plugin loading
# + concurrent reconciliation on single-node homelab exceeds 256Mi.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi

trivy:
  mode: ClientServer                    # 配合 builtInTrivyServer
  ignoreUnfixed: true                   # 只报有修复版本的 CVE
  severity: "HIGH,CRITICAL"             # 只扫高危

  # trivy ≥0.72.0 必须:0.71 的临时目录是 /tmp/trivy-<PID>,而扫描 pod 内所有
  # 容器共享 /tmp emptyDir 且 trivy 的 PID 相同 → 多容器 workload(loki、tetragon)
  # 扫描 100% 撞名,先扫完的容器清目录摧毁另一个 → Job 失败 + "Job failed to
  # complete" 告警。0.72.0 改为随机后缀(trivy-operator#2859)。
  image:
    tag: "0.72.0"

  # ---- Accepted-risk CVE 抑制(2026-07-17)----
  # 这些 CVE 的"修复版本"是 Go/grpc 层面的,vendor 尚未发布重建镜像,我们无法升级修掉;
  # 挂着只会让 TrivyImageCriticalVulnerabilities 永久 firing、淹没真正可行动的告警。
  # ⚠️ 格式坑(改动前必读):
  #   1. 必须用 .trivyignore.yaml(YAML)格式:chart 把 ignoreFile 列表渲染成
  #      "- CVE-xxx" 行,纯文本解析器取行首 fields[0]("-")当 ID → 静默失效;
  #   2. 不能用 expired_at 字段:helm values 的 YAML→JSON 往返会把日期变成带引号的
  #      字符串,而 trivy(yaml.v3)只对不带引号的标量做 timestamp 解析 →
  #      decode error → 所有扫描 Job FATAL。复审日期只能写在 statement 里。
  ignoreFileName: ".trivyignore.yaml"
  ignoreFile:
    vulnerabilities:
      # Go stdlib(修复需 vendor 用 Go 1.24.13/1.25.7+ 重建):argocd v3.4.5(已是
      # 最新 stable)、alertmanager-gotify-bridge(无维护)、CWA 内置 kepubify
      - id: CVE-2025-68121
        statement: "Go stdlib, 等上游重建镜像; argocd v3.5 GA 约 2026-08-04, 2026-09 复审"
      # grpc-go 1.79.3 才修复;argocd v3.4.5 仍带 1.72.1(tempo 已升 2.9.2 修掉)
      - id: CVE-2026-33186
        statement: "grpc-go, argocd v3.4.5 无可用修复版, 等 v3.4.6/v3.5, 2026-09 复审"
      # calibre-web-automated 镜像内 kepubify 为 Go 1.17.8 构建,上游一直未重建
      - id: CVE-2023-24538
        statement: "CWA kepubify (Go 1.17.8), 上游未重建, 2026-11 复审"
      - id: CVE-2023-24540
        statement: "CWA kepubify (Go 1.17.8), 上游未重建, 2026-11 复审"
      - id: CVE-2024-24790
        statement: "CWA kepubify (Go 1.17.8), 上游未重建, 2026-11 复审"
  # 扫描 Job（client）资源
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # 内置 Trivy server：持久化漏洞 DB（local-path，2026-07-11 从 nfs-client 迁移，
  # 消除对 106 的运行时依赖）；DB 可丢可重建，重下一次即可
  storageClassName: local-path
  storageSize: 2Gi
  server:
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Prometheus 集成 —— ServiceMonitor 必须带 release 标签，否则被 operator 的 ruleSelector 忽略
serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
