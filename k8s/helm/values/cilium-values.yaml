# Cilium CNI values for homelab K3s (single-node)
# Cilium provides the data plane, Gateway API ingress, and ClusterMesh control plane.
# Docs: https://docs.cilium.io/en/stable/installation/k8s-install-helm/

# --- kube-proxy replacement: required for Cilium Gateway API ---
# Re-enabled after rebuilding homelab on Ubuntu 24.04 LTS (kernel 6.8.x).
# K3s must also set disable-kube-proxy: true in /etc/rancher/k3s/config.yaml.
kubeProxyReplacement: true

# --- API server address: required when kube-proxy is disabled ---
k8sServiceHost: "10.10.10.10"
k8sServicePort: 6443

cluster:
  name: homelab
  id: 1

# --- Routing: VXLAN tunnel for cross-cluster traffic via Tailscale ---
routingMode: tunnel
tunnelProtocol: vxlan

# --- IPAM: match K3s default Pod CIDR ---
ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.42.0.0/16"

# --- Resources: bound the cilium-agent DaemonSet ---
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# --- Envoy DaemonSet (L7 features for Gateway API) ---
envoy:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 192Mi

# --- Operator: single node, no anti-affinity needed ---
operator:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 192Mi

# --- Hubble: observability ---
hubble:
  enabled: true
  tls:
    enabled: true
    auto:
      enabled: true
      # Cilium chart expects "cronJob" (capital J). Using "cronjob" skips certgen resources
      # and leaves Hubble Relay waiting for hubble-relay-client-certs forever.
      method: cronJob
      # Keep the default 1-year lifetime; longer self-signed certs break some macOS clients.
      certValidityDuration: 365
  relay:
    enabled: true
  # Hubble UI 浏览器界面用得少；CLI 仍可经 hubble-relay 使用
  ui:
    enabled: false

# --- Gateway API: Cilium-managed ingress ---
gatewayAPI:
  enabled: true

# --- ClusterMesh: deploy the control-plane pieces, then connect clusters with cilium CLI ---
clustermesh:
  useAPIServer: true
  config:
    enabled: true
  apiserver:
    service:
      type: NodePort
      nodePort: 32379
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 192Mi
    etcd:
      resources:
        requests:
          cpu: 50m
          memory: 96Mi
        limits:
          cpu: 500m
          memory: 256Mi
    kvstoremesh:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 128Mi

# --- cgroup: K3s mounts cgroup v2 at /sys/fs/cgroup ---
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
