apiVersion: batch/v1
kind: CronJob
metadata:
  name: restic-backup
  namespace: backup
spec:
  schedule: "0 3 * * *"           # 默认值；各 overlay 覆盖以错峰（homelab 03:00 / oracle 03:30）
  timeZone: "Asia/Shanghai"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600   # 超 1h 视为卡住（如 NFS hang）→ 失败告警而非常驻
      backoffLimit: 1
      template:
        metadata:
          labels: { app: restic-backup }
        spec:
          restartPolicy: Never
          # 单节点集群；hostPath 本就只落在唯一节点
          securityContext:
            runAsUser: 0             # 需 root 读 hostPath 各 uid 文件 + 写 /root/.ssh
          containers:
            - name: backup
              image: alpine:3.20
              command: ["sh", "/scripts/backup.sh"]
              resources:
                requests: { cpu: "50m", memory: "128Mi" }
                # limits 由各 overlay 设置（homelab 热节点收紧 / oracle 余量大）
              volumeMounts:
                - { name: script,    mountPath: /scripts,   readOnly: true }
                - { name: creds,     mountPath: /creds,     readOnly: true }
                - { name: work,      mountPath: /work }
                - { name: localpath, mountPath: /localpath, readOnly: true }
          volumes:
            - name: script
              configMap: { name: restic-backup-script }
            - name: creds
              secret: { secretName: restic-backup, defaultMode: 0400 }
            - name: work
              emptyDir: {}
            - name: localpath
              hostPath: { path: /var/lib/rancher/k3s/storage, type: Directory }
