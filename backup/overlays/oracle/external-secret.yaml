apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-backup
  namespace: backup
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend          # oracle ESO → homelab Vault (Tailscale)
    kind: ClusterSecretStore
  target:
    name: restic-backup
    creationPolicy: Owner
  data:
  # 共享的 restic 仓库凭据（跨路径读 homelab Vault，同 argocd-oracle-cluster 模式）
  - secretKey: RESTIC_PASSWORD
    remoteRef: { key: secret/homelab/restic, property: repo_password }
  - secretKey: SSH_KEY_B64
    remoteRef: { key: secret/homelab/restic, property: ssh_private_key_b64 }
  # 共享 rss-postgres 超级用户（miniflux）口令 → pg_dumpall
  - secretKey: PG_PASSWORD
    remoteRef: { key: secret/oracle-k3s/miniflux, property: db_password }
  # ZITADEL PG（独立实例，2026-07-06 迁来）口令 → pg_dump
  - secretKey: ZITADEL_PG_PASSWORD
    remoteRef: { key: secret/homelab/zitadel, property: db-password }
