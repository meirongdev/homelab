apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-backup
  namespace: backup
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: restic-backup
    creationPolicy: Owner
  data:
  # restic 仓库凭据 + 专用 SSH key + Vault 备份 token（secret/homelab/restic，本计划 bootstrap 写入）
  - secretKey: RESTIC_PASSWORD
    remoteRef: { key: secret/homelab/restic, property: repo_password }
  # base64 编码存储，避免 KV 往返丢失私钥尾部换行（否则 ssh "error in libcrypto"）
  - secretKey: SSH_KEY_B64
    remoteRef: { key: secret/homelab/restic, property: ssh_private_key_b64 }
  - secretKey: VAULT_TOKEN
    remoteRef: { key: secret/homelab/restic, property: vault_token }
  # （ZITADEL_DB_PASSWORD 已移除：zitadel 2026-07-06 迁 oracle，其 PG 由 oracle 侧备份）
