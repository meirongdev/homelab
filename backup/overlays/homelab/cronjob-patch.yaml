apiVersion: batch/v1
kind: CronJob
metadata:
  name: restic-backup
  namespace: backup
spec:
  schedule: "0 3 * * *"           # 03:00 本地时区（错峰；oracle 用 03:30）
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              resources:
                limits: { cpu: "200m", memory: "256Mi" }   # 控 CPU（热节点）
          # nfsdata 挂载已移除（2026-07-11）：全部 PVC 已迁 local-path，
          # 备份 Job 不再依赖 106 的 NFS 在线（106 只作为 sftp 备份目标）
