apiVersion: v1
kind: ConfigMap
metadata:
  name: restic-backup-script
  namespace: backup
data:
  backup.sh: |
    #!/bin/sh
    # homelab nightly backup → restic 仓库 (106 ZFS, sftp)
    # 逻辑 dump 保证一致性：Vault=raft snapshot API；
    # sqlite/文件 PVC=从 local-path 原样拷贝（restic 读原始文件，restore 时 sqlite 由 WAL 自恢复）；
    # calibre 书库（calibre-books-local，~24G）以目录整体纳入 restic（增量去重，首晚全量后每晚近零成本）。
    set -eu

    echo "[backup] installing tools (restic/openssh/pg/curl/findutils)..."
    apk add --no-cache restic openssh-client postgresql-client curl findutils >/dev/null

    # --- SSH（走 ~/.ssh/config，避免每条命令重复 -o sftp.command）---
    install -d -m 700 /root/.ssh
    base64 -d /creds/SSH_KEY_B64 > /root/.ssh/id_ed25519   # b64 存储，保尾部换行
    chmod 600 /root/.ssh/id_ed25519
    cat > /root/.ssh/config <<EOF
    Host 192.168.50.106 100.110.27.111
      User root
      IdentityFile /root/.ssh/id_ed25519
      StrictHostKeyChecking accept-new
      UserKnownHostsFile /root/.ssh/known_hosts
    EOF
    chmod 600 /root/.ssh/config

    export RESTIC_PASSWORD="$(cat /creds/RESTIC_PASSWORD)"
    export RESTIC_REPOSITORY="sftp:root@192.168.50.106:/storage/restic"

    rm -rf /work/* 2>/dev/null || true
    mkdir -p /work/pvc

    # --- 1) Vault raft snapshot（token 先 renew-self，尽力）---
    echo "[backup] vault raft snapshot..."
    VT="$(cat /creds/VAULT_TOKEN)"
    curl -sf -X POST -H "X-Vault-Token: $VT" http://vault.vault.svc:8200/v1/auth/token/renew-self >/dev/null 2>&1 || echo "[warn] vault token renew-self failed (continuing)"
    curl -sf -H "X-Vault-Token: $VT" http://vault.vault.svc:8200/v1/sys/storage/raft/snapshot -o /work/vault.snap
    echo "[backup]   vault.snap = $(wc -c < /work/vault.snap) bytes"

    # （ZITADEL pg_dump 与 gotify 已于 2026-07-06 迁 oracle，改由 oracle 侧脚本备份；
    #   2026-07-07 从本脚本移除 —— homelab 的 zitadel ns 已删，遗留 dump 步骤导致夜备失败。）

    # --- 2) sqlite/config PVC（local-path；2026-07-11 起全部 PVC 已迁离 NFS）---
    # 只取 sqlite DB(+WAL/SHM) 与小 json 配置；剪掉 processed_books/thumbnails 等
    # 可重建缓存（calibre config PVC 里这类缓存达 12G，不能整目录备份）。
    echo "[backup] copy sqlite/config files (*.db*/small *.json, prune cache)..."
    for base in /localpath; do
      [ -d "$base" ] || continue
      for pat in bifrost-data calibre-web-automated-config; do
        for d in "$base"/*"$pat"*; do
          [ -d "$d" ] || continue
          dest="/work/pvc/$(basename "$d")"
          find "$d" -maxdepth 3 \
            \( -name processed_books -o -name thumbnails -o -name cache \) -prune -o \
            -type f \( -name '*.db' -o -name '*.db-wal' -o -name '*.db-shm' -o -name '*.sqlite*' -o -name '*.json' \) -size -80M -print 2>/dev/null | \
          while IFS= read -r f; do
            rel="${f#"$d"/}"
            mkdir -p "$dest/$(dirname "$rel")"
            cp -a "$f" "$dest/$rel" 2>/dev/null || true
          done
        done
      done
    done
    echo "[backup]   pvc files = $(find /work/pvc -type f 2>/dev/null | wc -l), size = $(du -sh /work/pvc 2>/dev/null | cut -f1)"

    # --- 3) restic backup + 保留策略 ---
    # 书库目录直接纳入（不经 /work 中转，避免每晚 24G 拷贝）；
    # PVC 重建会改变 pvc-<uid> 路径前缀 → restic 视为新路径重传一次，属预期。
    BOOKS_DIR="$(ls -d /localpath/*calibre-books-local* 2>/dev/null | head -1 || true)"
    [ -n "$BOOKS_DIR" ] || echo "[warn] calibre-books-local not found under /localpath — books NOT in this backup!"
    echo "[backup] restic backup (work + books)..."
    restic cat config >/dev/null 2>&1 || restic init
    restic backup /work ${BOOKS_DIR:+"$BOOKS_DIR"} --host homelab --tag nightly --cleanup-cache
    echo "[backup] forget/prune..."
    restic forget --host homelab --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune
    restic snapshots --host homelab --latest 2
    echo "[backup] DONE"
