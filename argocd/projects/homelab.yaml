apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Homelab GitOps project

  sourceRepos:
    - https://github.com/meirongdev/homelab
    - https://argoproj.github.io/argo-helm
    # 安全加固组件的 Helm chart 仓库（Kyverno 准入策略 / Trivy Operator 漏洞扫描）
    - https://kyverno.github.io/kyverno
    - https://aquasecurity.github.io/helm-charts
    # Phase 2 运行时检测：Tetragon(homelab) / Falco(oracle)
    - https://helm.cilium.io/
    - https://falcosecurity.github.io/charts

  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
    # oracle-k3s 公网端点(保留作 fallback)
    - server: https://152.69.195.151:6443
      namespace: "*"
    # oracle-k3s Tailscale 端点(canonical;cluster Secret + Application 均用此)
    - server: https://100.107.166.37:6443
      namespace: "*"

  # 允许管理集群级资源（Namespace、ClusterRole 等）
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
