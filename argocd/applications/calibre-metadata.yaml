apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calibre-metadata
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab

  source:
    repoURL: https://github.com/meirongdev/homelab
    targetRevision: main
    path: k8s/helm/manifests/calibre-metadata

  destination:
    server: https://kubernetes.default.svc
    namespace: personal-services

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
