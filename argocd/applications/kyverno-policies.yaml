apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  # 与 kyverno 安装分离，便于逐条把策略从 Audit 提升到 Enforce（改 git 即可）。
  # 首次同步可能因 ClusterPolicy CRD 尚未就绪而短暂失败，待 kyverno App 装好 CRD 后自动重试通过。
  source:
    repoURL: https://github.com/meirongdev/homelab
    targetRevision: main
    path: k8s/helm/manifests/kyverno-policies
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  # Kyverno admission webhook 会给 ClusterPolicy 回填一批服务端默认字段，git 清单里没有
  # → ArgoCD 永远 OutOfSync（纯化妆性，策略本身 Ready 且在工作）。忽略这些默认字段。
  ignoreDifferences:
    - group: kyverno.io
      kind: ClusterPolicy
      jqPathExpressions:
        - .spec.admission
        - .spec.emitWarning
        - .spec.validationFailureAction
        - .spec.rules[].skipBackgroundRequests
        - .spec.rules[].validate.allowExistingViolations
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
