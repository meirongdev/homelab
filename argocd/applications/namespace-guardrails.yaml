apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespace-guardrails
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  # 跨多个 namespace 的 LimitRange 护栏（资源各自声明 namespace；dest.namespace 仅作 fallback）。
  source:
    repoURL: https://github.com/meirongdev/homelab
    targetRevision: main
    path: k8s/helm/manifests
    directory:
      include: "namespace-guardrails.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
