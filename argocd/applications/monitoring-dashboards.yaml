apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://github.com/meirongdev/homelab
    targetRevision: main
    path: k8s/helm/manifests
    directory:
      include: "{grafana-dashboards.yaml,multicluster-overview-dashboard.yaml,dgx-spark-node-dashboard.yaml,macbook-node-dashboard.yaml,storage-106-dashboard.yaml,proxmox-pve-dashboard.yaml,power-overview-dashboard.yaml,eso-alerts.yaml,external-dns-alerts.yaml,cilium-envoy-servicemonitor.yaml,slos.yaml,slo-dashboard.yaml,trivy-alerts.yaml,trivy-dashboard.yaml,kyverno-dashboard.yaml,security-events-dashboard.yaml,storage-alerts.yaml,prometheus-rules.yaml,alertmanager-config.yaml,alertmanager-telegram-secret.yaml,monitoring-external.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
