---
# oracle-k3s 工作负载,由 homelab ArgoCD 经 Tailscale 纳管。
# 起步阶段故意不开 automated（先人工对账 diff，确认无意外删除后再开 prune+selfHeal，见 Task 7）。
# 集群凭据见 ESO oracle-k3s-cluster（Task 3），destination 走 Tailscale（Task 1/4）。
# 见 docs/plans/2026-06-04-oracle-k3s-argocd-gitops.md
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oracle-k3s
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # argocd-image-updater 仅跟踪 trends 这一个镜像(其余 workload 不受影响)。
    # 跟踪 ghcr 上 :main 的 digest,变更时把 digest pin 写回 Git(走已有 git-creds),
    # ArgoCD 再同步到 oracle-k3s。镜像由 trends 仓库 CI 推送。
    argocd-image-updater.argoproj.io/image-list: trends=ghcr.io/meirongdev/trends
    argocd-image-updater.argoproj.io/trends.update-strategy: digest
    argocd-image-updater.argoproj.io/trends.allow-tags: regexp:^main$
    argocd-image-updater.argoproj.io/trends.kustomize.image-name: ghcr.io/meirongdev/trends
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: homelab

  source:
    repoURL: https://github.com/meirongdev/homelab
    targetRevision: main
    path: cloud/oracle/manifests # Kustomize 树

  destination:
    server: https://100.107.166.37:6443
    namespace: default # 仅作无 namespace 资源的兜底；manifests 各自声明 ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false # namespace 已在 kustomize 树内
      # 有状态 PVC（miniflux-db/karakeep/meilisearch/uptime-kuma/stirling-pdf）
      # 带 argocd.argoproj.io/sync-options: Prune=false 护栏，防误删数据。
