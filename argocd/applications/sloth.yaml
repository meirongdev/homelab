---
# Sloth — SLO 生成器（PrometheusServiceLevel CR → PrometheusRule）
# Chart: sloth/sloth
# Values: k8s/helm/values/sloth-values.yaml
# 2026-07-06: 从 Helm 直接管理迁入 ArgoCD（参照 falco.yaml 的 multi-source 模式）
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sloth
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab

  sources:
    - repoURL: https://slok.github.io/sloth
      chart: sloth
      targetRevision: "0.16.0"
      helm:
        valueFiles:
          - $values/k8s/helm/values/sloth-values.yaml
    - repoURL: https://github.com/meirongdev/homelab
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
