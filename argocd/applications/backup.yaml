---
# restic-backup — 离站备份 CronJob + ExternalSecret
# 原为 kubectl apply 管理（just deploy-backup），
# 2026-07-06 迁入 ArgoCD 以实现 GitOps 自动同步。
# 2026-07-07 与 oracle 备份合并为 kustomize base+overlay（backup/）。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backup
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab

  source:
    repoURL: https://github.com/meirongdev/homelab
    targetRevision: main
    path: backup/overlays/homelab

  destination:
    server: https://kubernetes.default.svc
    namespace: backup

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
