apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  sources:
    # Trivy Operator chart 版本 —— 部署前先 `helm search repo aqua/trivy-operator --versions`
    # 确认该版本存在并按需调整（chart 版本 ≠ Trivy 版本）。
    - repoURL: https://aquasecurity.github.io/helm-charts
      chart: trivy-operator
      targetRevision: "0.33.1"
      helm:
        valueFiles:
          - $values/k8s/helm/values/trivy-operator.yaml
    - repoURL: https://github.com/meirongdev/homelab
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: trivy-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
