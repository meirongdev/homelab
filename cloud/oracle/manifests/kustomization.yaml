apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Base infrastructure
  - base/vault-store.yaml
  - base/cloudflare-tunnel.yaml
  - base/gateway.yaml
  # RSS system
  - rss-system/namespace.yaml
  - rss-system/secrets.yaml
  - rss-system/miniflux.yaml
  - rss-system/rsshub.yaml
  - rss-system/karakeep.yaml
  - rss-system/redpanda-connect.yaml
  # Homepage
  - homepage/namespace.yaml
  - homepage/homepage.yaml
  # Uptime Kuma
  - uptime-kuma/namespace.yaml
  - uptime-kuma/uptime-kuma.yaml
  - uptime-kuma/secrets.yaml
  - uptime-kuma/provisioner.yaml
  # Observability (lightweight collectors — infra lives on homelab)
  - monitoring/namespace.yaml
  - monitoring/otel-collector.yaml
  - monitoring/exporters.yaml
  # Falco 运行时检测：namespace + falcosidekick→Gotify token（Falco 工作负载由独立 falco Helm App 部署）
  - falco/namespace.yaml
  - falco/falcosidekick-secret.yaml
  # Backup: serverless restic → 106 ZFS 仓库（Tailscale sftp）。见 plans/2026-07-06-…backup-redesign.md
  - backup/namespace.yaml
  - backup/external-secret.yaml
  - backup/backup-script.yaml
  - backup/cronjob.yaml
  # Gotify: 迁自 homelab 2026-07-06（脱离 homelab 故障域）。notify.meirong.dev tunnel/DNS 切换待 CF apply
  - gotify/gotify.yaml
  # Personal services (IT-Tools, Stirling-PDF, Squoosh, Timeslot, Trends)
  - personal-services/it-tools.yaml
  - personal-services/stirling-pdf.yaml
  - personal-services/squoosh.yaml
  - personal-services/timeslot.yaml
  - personal-services/trends.yaml
