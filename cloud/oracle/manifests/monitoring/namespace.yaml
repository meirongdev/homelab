apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    # node-exporter(hostNet/hostPID/hostPath) + otel(hostPath) 需特权 → enforce privileged，
    # 显式豁免；warn/audit 仍记 baseline，未来混入特权 Pod 可被发现。
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline
