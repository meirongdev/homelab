---
# OTel Collector DaemonSet for oracle-k3s
# Collects:
#   - container logs        → homelab Loki via Tailscale (otlphttp)
#   - cloudflared metrics   → homelab Prometheus via Tailscale (prometheusremotewrite)
#   - cilium-envoy metrics  → homelab Prometheus（网关 L7 RED 指标，oracle 网关 SLO 数据源）
#   - application traces    → homelab Tempo via Tailscale (otlp grpc)
# Architecture: apps/filelog/prometheus -> memory_limiter/k8sattributes/resource/batch -> otlphttp / prometheusremotewrite / otlp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: monitoring
---
# ClusterIP Service — applications send OTLP traces/logs here
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: health
      port: 13133
      targetPort: 13133
      protocol: TCP
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.120.0
          args:
            - --config=/etc/otel/config.yaml
          ports:
            - containerPort: 4317
              name: otlp-grpc
              protocol: TCP
            - containerPort: 4318
              name: otlp-http
              protocol: TCP
            - containerPort: 13133
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # Sole logs+metrics+traces pipeline for oracle-k3s — under-resourcing
              # it means an OOM blinds the whole cluster. memory_limiter (below) is
              # kept well under this ceiling to account for Go RSS > heap.
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otel/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
      tolerations:
        - operator: Exists
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      # OTLP receiver — applications send traces/logs/metrics here
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/monitoring_otel-collector*/*/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Parse CRI/containerd log format
          - type: router
            id: get-format
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
              - output: parser-cri
                expr: 'body matches "^[^ Z]+ "'
              - output: parser-containerd
                expr: 'body matches "^[^ Z]+Z"'
          # Docker JSON format
          - type: json_parser
            id: parser-docker
            output: extract-metadata-from-filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          # CRI format
          - type: regex_parser
            id: parser-cri
            regex: '^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract-metadata-from-filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%L%j'
          # Containerd format
          - type: regex_parser
            id: parser-containerd
            regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract-metadata-from-filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          # Extract metadata from file path
          - type: regex_parser
            id: extract-metadata-from-filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]+)\/(?P<container_name>[^\._]+)\/(?P<restart_count>\d+)\.log$'
            parse_from: attributes["log.file.path"]
          # Promote extracted filepath attributes to resource attributes for k8sattributes processor
          - type: move
            from: attributes.uid
            to: resource["k8s.pod.uid"]
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.container_name
            to: resource["k8s.container.name"]
          - type: move
            from: attributes.log
            to: body
          - type: move
            from: attributes.stream
            to: attributes["log.iostream"]

      # cloudflared metrics — ClusterIP within cloudflare namespace
      prometheus/cloudflared:
        config:
          scrape_configs:
            - job_name: 'cloudflared'
              scrape_interval: 30s
              static_configs:
                - targets: ['cloudflared-metrics.cloudflare.svc.cluster.local:2000']
                  labels:
                    cluster: oracle-k3s
                    tunnel: cloudflared

      # Node Exporter — host-level CPU/memory/disk/network metrics
      # node-exporter runs with hostNetwork:true, accessible via node IP
      prometheus/node-exporter:
        config:
          scrape_configs:
            - job_name: 'node-exporter'
              scrape_interval: 15s
              static_configs:
                - targets: ['10.0.0.26:9100']
                  labels:
                    cluster: oracle-k3s

      # Kube State Metrics — K8s object state (pods, deployments, etc.)
      prometheus/kube-state-metrics:
        config:
          scrape_configs:
            - job_name: 'kube-state-metrics'
              scrape_interval: 30s
              static_configs:
                - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']
                  labels:
                    cluster: oracle-k3s

      # Cilium Gateway Envoy L7 指标 —— zitadel 等 oracle 入口可用性 SLO
      # (k8s/helm/manifests/slos.yaml › oracle-gateway-availability) 的数据源。
      # 对应 homelab 侧的 cilium-envoy ServiceMonitor；oracle 无 Prometheus Operator，
      # 由 otel-collector 直接抓取 headless Service cilium-envoy(:9964)。
      # keep 正则与 homelab 一致：只保留 RED SLI 所需请求指标，丢弃其余 ~5000 条 Envoy 内部指标。
      prometheus/cilium-envoy:
        config:
          scrape_configs:
            - job_name: 'cilium-envoy'
              scrape_interval: 30s
              static_configs:
                - targets: ['cilium-envoy.kube-system.svc.cluster.local:9964']
                  labels:
                    cluster: oracle-k3s
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: 'envoy_cluster_upstream_rq(_xx|_total|_time_(bucket|sum|count))?|envoy_http_downstream_rq(_xx|_time_(bucket|sum|count))?'
                  action: keep

      # External Secrets Operator metrics → homelab Prometheus (cluster=oracle-k3s).
      # Surfaces ExternalSecret/SecretStore Ready=False so a stale/expired
      # vault-token (silent secret-sync failure) trips the shared PrometheusRule.
      # Requires the ESO metrics Service — `just install-eso` now sets
      # metrics.service.enabled=true.
      prometheus/external-secrets:
        config:
          scrape_configs:
            - job_name: 'external-secrets'
              scrape_interval: 30s
              static_configs:
                - targets: ['external-secrets-metrics.external-secrets.svc.cluster.local:8080']
                  labels:
                    cluster: oracle-k3s

      # external-dns metrics → homelab Prometheus (cluster=oracle-k3s). oracle-k3s has no
      # Prometheus Operator, so (unlike homelab's ServiceMonitor) the controller's :7979
      # metrics are scraped here and remote-written. Surfaces reconcile-stalled / registry &
      # source errors so a silently-failing oracle external-dns (expired token, rate limit)
      # trips the shared external-dns PrometheusRule. The chart exposes the metrics Service
      # by default (no serviceMonitor needed).
      prometheus/external-dns:
        config:
          scrape_configs:
            - job_name: 'external-dns'
              scrape_interval: 30s
              static_configs:
                - targets: ['external-dns.external-dns.svc.cluster.local:7979']
                  labels:
                    cluster: oracle-k3s

    processors:
      memory_limiter:
        limit_mib: 400
        spike_limit_mib: 100
        check_interval: 5s
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.node.name
            - k8s.deployment.name
            - k8s.container.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
      resource:
        attributes:
          - key: cluster
            value: oracle-k3s
            action: upsert
      batch:
        send_batch_size: 10000
        timeout: 5s

    exporters:
      # Logs → homelab Loki via Tailscale (OTLP HTTP)
      otlphttp:
        endpoint: "http://100.94.186.7:31080/otlp"
        tls:
          insecure: true
      # Metrics → homelab Prometheus via Tailscale (Prometheus Remote Write)
      prometheusremotewrite:
        endpoint: "http://100.94.186.7:31090/api/v1/write"
        tls:
          insecure: true
        external_labels:
          cluster: oracle-k3s
      # Traces → homelab Tempo via Tailscale (OTLP gRPC)
      otlp/tempo:
        endpoint: "100.94.186.7:31317"
        tls:
          insecure: true
      debug:
        verbosity: basic

    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: warn
      pipelines:
        logs:
          receivers: [filelog, otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlphttp]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlp/tempo]
        metrics/cloudflared:
          receivers: [prometheus/cloudflared]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]
        metrics/node-exporter:
          receivers: [prometheus/node-exporter]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]
        metrics/kube-state-metrics:
          receivers: [prometheus/kube-state-metrics]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]
        metrics/external-secrets:
          receivers: [prometheus/external-secrets]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]
        metrics/external-dns:
          receivers: [prometheus/external-dns]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]
        metrics/cilium-envoy:
          receivers: [prometheus/cilium-envoy]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite]
