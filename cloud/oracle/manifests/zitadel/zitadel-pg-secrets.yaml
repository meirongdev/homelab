# CNPG 集群凭据 —— 复用 ZITADEL 现有的 secret/homelab/zitadel db-password（不新开 Vault 值）。
# 目的：迁移后 ZITADEL 自己的 zitadel-config/zitadel-postgres-auth ExternalSecret 完全不用改，
# 只需把 Database.Host 指向新集群 Service（zitadel-pg-rw）即可——密码两边始终一致。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zitadel-pg-app-secret
  namespace: zitadel
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: zitadel-pg-app-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: zitadel
        password: "{{ .db_password }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: secret/homelab/zitadel
        property: db-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zitadel-pg-superuser-secret
  namespace: zitadel
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: zitadel-pg-superuser-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: postgres
        password: "{{ .db_password }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: secret/homelab/zitadel
        property: db-password
