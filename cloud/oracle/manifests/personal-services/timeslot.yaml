---
# Timeslot — supplementary resources (Kustomize-managed)
# App resources (Deployment, Service, PVC, ConfigMap, Secret) are managed by Helm.
# See: cloud/oracle/justfile deploy-timeslot
#
# HTTPRoute: slot.meirong.dev -> timeslot
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: timeslot
  namespace: personal-services
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: oracle-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "slot.meirong.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # No SSO: timeslot has its own Basic Auth on /admin/ and the API (/api/slots)
      # is intentionally public (for blog embedding). SSO's --pass-authorization-header=true
      # would inject Authorization: Bearer, overwriting the browser's Basic Auth → 401.
      backendRefs:
        - group: ""
          kind: Service
          name: timeslot
          port: 8080
          weight: 1
