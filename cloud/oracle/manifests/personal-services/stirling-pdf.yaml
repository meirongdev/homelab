# stirling-pdf-auth ExternalSecret: built-in H2 login (username/password) kept as a
# FALLBACK, plus the ZITADEL OIDC client credentials for native SSO ("Sign in with
# GitHub" via ZITADEL's federated IdP). OIDC client provisioned by
# zitadel/scripts/configure-oidc-app.sh (app "stirling-pdf", redirect
# https://pdf.meirong.dev/login/oauth2/code/oidc). Creds live in Vault at
# secret/oracle-k3s/stirling-pdf (keys: oauth_client_id, oauth_client_secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stirling-pdf-auth
  namespace: personal-services
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: stirling-pdf-auth
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: oracle-k3s/stirling-pdf
        property: username
    - secretKey: password
      remoteRef:
        key: oracle-k3s/stirling-pdf
        property: password
    - secretKey: oauth-client-id
      remoteRef:
        key: oracle-k3s/stirling-pdf
        property: oauth_client_id
    - secretKey: oauth-client-secret
      remoteRef:
        key: oracle-k3s/stirling-pdf
        property: oauth_client_secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stirling-pdf-configs
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf
  namespace: personal-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling-pdf
  template:
    metadata:
      labels:
        app: stirling-pdf
    spec:
      containers:
        - name: stirling-pdf
          image: stirlingtools/stirling-pdf@sha256:74c9ad9e280087f0652bfc98c9b5524b03ea5c138050406d2e3936f9cd60906f
          ports:
            - containerPort: 8080
          env:
            - name: DOCKER_ENABLE_SECURITY
              value: "true"
            - name: SECURITY_ENABLE_LOGIN
              value: "true"
            - name: INSTALL_BOOK_AND_ADVANCED_HTML_OPS
              value: "false"
            - name: SECURITY_INITIALLOGIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stirling-pdf-auth
                  key: username
            - name: SECURITY_INITIALLOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stirling-pdf-auth
                  key: password
            # --- ZITADEL OIDC SSO (native generic OIDC; password login above stays as fallback) ---
            - name: SECURITY_OAUTH2_ENABLED
              value: "true"
            # Bare issuer — Stirling appends /.well-known/openid-configuration itself.
            - name: SECURITY_OAUTH2_ISSUER
              value: "https://auth.meirong.dev"
            - name: SECURITY_OAUTH2_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: stirling-pdf-auth
                  key: oauth-client-id
            - name: SECURITY_OAUTH2_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: stirling-pdf-auth
                  key: oauth-client-secret
            - name: SECURITY_OAUTH2_SCOPES
              value: "openid, profile, email"
            - name: SECURITY_OAUTH2_USEASUSERNAME
              value: "email"
            # Display label only; the registration id (and thus redirect path) is hard-coded to "oidc".
            - name: SECURITY_OAUTH2_PROVIDER
              value: "zitadel"
            # First SSO login auto-provisions a Stirling user keyed by email.
            - name: SECURITY_OAUTH2_AUTOCREATEUSER
              value: "true"
            - name: SECURITY_OAUTH2_BLOCKREGISTRATION
              value: "false"
          volumeMounts:
            - name: configs
              mountPath: /configs
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: configs
          persistentVolumeClaim:
            claimName: stirling-pdf-configs
---
apiVersion: v1
kind: Service
metadata:
  name: stirling-pdf
  namespace: personal-services
spec:
  selector:
    app: stirling-pdf
  ports:
    - port: 8080
      targetPort: 8080
---
# HTTPRoute: pdf.meirong.dev -> stirling-pdf
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stirling-pdf
  namespace: personal-services
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: oracle-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "pdf.meirong.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: stirling-pdf
          port: 8080
          weight: 1
