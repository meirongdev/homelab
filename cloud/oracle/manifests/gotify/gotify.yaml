---
# Gotify — 消息推送 (2026-07-06 从 homelab 迁来，脱离 homelab 故障域，配合 dead-man's switch)
# 告警桥 alertmanager-gotify-bridge 留在 homelab(monitoring)，经 https://notify.meirong.dev 打过来(URL 不变)。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gotify-secret
  namespace: personal-services
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gotify-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: default-user-password
      remoteRef:
        key: secret/homelab/gotify
        property: default_user_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gotify-data
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify
  namespace: personal-services
  labels:
    app: gotify
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  strategy:
    type: Recreate   # 单写 RWO sqlite
  selector:
    matchLabels:
      app: gotify
  template:
    metadata:
      labels:
        app: gotify
    spec:
      containers:
        - name: gotify
          image: gotify/server@sha256:a3af47067ce6aad76aadf5ba32d6ddfecd1ae576a961359f039fd1831e8b7652
          ports:
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: "Asia/Shanghai"
            - name: GOTIFY_DEFAULTUSER_NAME
              value: "admin"
            - name: GOTIFY_DEFAULTUSER_PASS
              valueFrom:
                secretKeyRef:
                  name: gotify-secret
                  key: default-user-password
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gotify-data
---
apiVersion: v1
kind: Service
metadata:
  name: gotify
  namespace: personal-services
spec:
  type: ClusterIP
  selector:
    app: gotify
  ports:
    - port: 80
      targetPort: 80
      name: http
