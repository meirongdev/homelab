# Falcosidekick → Telegram 的 bot token（ESO ← Vault secret/homelab/telegram，跨集群读取；
# 与 homelab Alertmanager 用同一个 bot/token，机制同 zitadel 的跨集群 Vault 读取先例）。
# 2026-07 起：Gotify 已下线，Falco 告警併入 Telegram 群 MatthewDaily「🚨 Homelab 告警」话题
# （chatid/messagethreadid 在 values/falco.yaml 明文配置，此处只提供 token）。
# secret 的 key 必须是大写 TELEGRAM_TOKEN —— falcosidekick 把 existingSecret 的 key 当环境变量读。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: falcosidekick-telegram
  namespace: falco
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: falcosidekick-telegram
    creationPolicy: Owner
  data:
    - secretKey: TELEGRAM_TOKEN
      remoteRef:
        key: homelab/telegram
        property: bot_token
