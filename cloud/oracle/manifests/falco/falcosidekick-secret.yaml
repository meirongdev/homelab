# Falcosidekick → Gotify 的 token（ESO ← Vault secret/oracle-k3s/falco）。
#
# ⚠️ 手动前置（一次性）：
#   1) 在 Gotify(notify.meirong.dev) 创建一个 Application，拿到其 token。
#   2) vault kv put secret/oracle-k3s/falco gotify_token=<token>
# 在此之前本 ExternalSecret 会 Ready=False（触发现有 ESO 健康告警，提示去设 token）；
# 此时 falcosidekick 因缺 secret 不启动，但 **Falco 检测照常**（JSON→stdout→Loki）。
# secret 的 key 必须是大写 GOTIFY_TOKEN —— falcosidekick 把 existingSecret 的 key 当环境变量读。
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: falcosidekick-gotify
  namespace: falco
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: falcosidekick-gotify
    creationPolicy: Owner
  data:
    - secretKey: GOTIFY_TOKEN
      remoteRef:
        key: oracle-k3s/falco
        property: gotify_token
