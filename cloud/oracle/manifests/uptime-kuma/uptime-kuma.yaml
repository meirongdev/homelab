---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  namespace: personal-services
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: personal-services
  labels:
    app: uptime-kuma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      # Override DNS to avoid Tailscale/OracleVCN search domain timeouts.
      # dnsPolicy: None + explicit dnsConfig fully replaces the generated resolv.conf
      # so taild*.ts.net and *.oraclevcn.com search domains are NOT inherited.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.53.0.10   # oracle-k3s CoreDNS ClusterIP
        searches:
          - personal-services.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1
          ports:
            - containerPort: 3001
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            # Oracle Cloud VMs have no IPv6 internet. Cloudflare domains return AAAA
            # records which Node.js/curl prefers by default, causing 48s timeouts.
            # Force DNS to resolve to IPv4 so monitors reach homelab services reliably.
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: personal-services
spec:
  type: ClusterIP
  selector:
    app: uptime-kuma
  ports:
    - port: 3001
      targetPort: 3001
      name: http
