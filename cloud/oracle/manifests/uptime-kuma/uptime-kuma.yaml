---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  namespace: personal-services
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
# POST→GET shim for the push API. Alertmanager's webhook receiver can only POST,
# but Kuma's push endpoint (router.get("/api/push/:token")) is GET-only — without
# this rewrite the homelab Watchdog dead-man's switch can never register a beat.
# The gateway HTTPRoute sends /api/push traffic to port 3002 (this sidecar).
apiVersion: v1
kind: ConfigMap
metadata:
  name: uptime-kuma-push-shim
  namespace: personal-services
data:
  default.conf: |
    server {
      listen 3002;
      location /api/push/ {
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_pass http://127.0.0.1:3001;
      }
      location / { return 404; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: personal-services
  labels:
    app: uptime-kuma
  annotations:
    # RollingUpdate->Recreate migration: ArgoCD's apply can't drop the API-defaulted
    # spec.strategy.rollingUpdate block (fails validation), so replace (PUT) the object.
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  # Single-writer RWO PVC (uptime-kuma-data, SQLite). Default RollingUpdate would
  # run a 2nd pod on the same volume; Recreate stops the old pod first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      # Override DNS to avoid Tailscale/OracleVCN search domain timeouts.
      # dnsPolicy: None + explicit dnsConfig fully replaces the generated resolv.conf
      # so taild*.ts.net and *.oraclevcn.com search domains are NOT inherited.
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.53.0.10   # oracle-k3s CoreDNS ClusterIP
        searches:
          - personal-services.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:1
          ports:
            - containerPort: 3001
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            # Oracle Cloud VMs have no IPv6 internet. Cloudflare domains return AAAA
            # records which Node.js/curl prefers by default, causing 48s timeouts.
            # Force DNS to resolve to IPv4 so monitors reach homelab services reliably.
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
        - name: push-shim
          image: nginx:1.28-alpine
          ports:
            - containerPort: 3002
              name: push-shim
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: push-shim-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
        - name: push-shim-conf
          configMap:
            name: uptime-kuma-push-shim
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: personal-services
spec:
  type: ClusterIP
  selector:
    app: uptime-kuma
  ports:
    - port: 3001
      targetPort: 3001
      name: http
    - port: 3002
      targetPort: 3002
      name: push-shim
