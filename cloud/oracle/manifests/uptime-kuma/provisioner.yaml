---
# Provisioner script — creates admin account + all monitors on first deploy
# Run manually: just provision-uptime-kuma
apiVersion: v1
kind: ConfigMap
metadata:
  name: uptime-kuma-provisioner
  namespace: personal-services
data:
  provision.py: |
    #!/usr/bin/env python3
    import os, sys, time, urllib.request

    UPTIME_KUMA_URL = os.environ.get("UPTIME_KUMA_URL", "http://uptime-kuma:3001")
    USERNAME = os.environ.get("ADMIN_USERNAME", "admin")
    PASSWORD = os.environ["ADMIN_PASSWORD"]

    # oracle-k3s local services: direct ClusterDNS via local CNI.
    # homelab services: public URLs via Cloudflare/Cilium Gateway, so status reflects real external reachability.
    # This keeps cross-cluster networking off the critical path for status monitoring.
    MONITORS = [
        # --- oracle-k3s local services ---
        {"name": "Homepage",       "url": "http://homepage.homepage.svc:3000"},
        {"name": "Miniflux",       "url": "http://miniflux.rss-system.svc:8080"},
        {"name": "IT-Tools",       "url": "http://it-tools.personal-services.svc:80"},
        {"name": "Squoosh",        "url": "http://squoosh.personal-services.svc:8080"},
        {"name": "Stirling-PDF",   "url": "http://stirling-pdf.personal-services.svc:8080/login"},
        {"name": "Uptime Kuma",    "url": "http://uptime-kuma.personal-services.svc:3001"},
        # --- homelab public services ---
        # Auth-protected services may redirect to their own login page; treat 2xx-3xx as healthy external reachability.
        # Do not follow redirects into full login exchanges.
        {"name": "Grafana",        "url": "https://grafana.meirong.dev/",       "accepted_statuscodes": ["300-399"], "maxredirects": 0},
        {"name": "HashiCorp Vault","url": "https://vault.meirong.dev/",         "accepted_statuscodes": ["300-399"], "maxredirects": 0},
        {"name": "Calibre-Web",    "url": "https://book.meirong.dev/",          "accepted_statuscodes": ["300-399"], "maxredirects": 0},
        {"name": "ArgoCD",         "url": "https://argocd.meirong.dev/",        "accepted_statuscodes": ["200-299", "300-399"]},
        # 备份服务（原 Kopia）现已迁移 Tailscale NodePort（https://100.94.186.7:31515，自签 cert），不再有公网入口，故不在此处探测。
        # --- new info pipeline services ---
        # KaraKeep: root / redirects 307 to /signin; monitor /signin directly (returns 200)
        {"name": "KaraKeep",       "url": "http://karakeep.rss-system.svc:3000/signin"},
        # Timeslot: oracle-k3s local service, direct ClusterDNS bypasses SSO
        {"name": "Timeslot",       "url": "http://timeslot.personal-services.svc:8080/api/slots"},
        # Trends: GitHub 趋势追踪, /healthz returns 200
        {"name": "Trends",         "url": "http://trends.personal-services.svc:8080/healthz"},
    ]

    def wait_ready(timeout=120):
        deadline = time.time() + timeout
        while time.time() < deadline:
            try:
                urllib.request.urlopen(UPTIME_KUMA_URL, timeout=5)
                print("Uptime Kuma is ready.")
                return
            except Exception:
                print("Waiting for Uptime Kuma...")
                time.sleep(5)
        print("ERROR: Uptime Kuma not ready after timeout", file=sys.stderr)
        sys.exit(1)

    wait_ready()

    from uptime_kuma_api import UptimeKumaApi, MonitorType, NotificationType
    api = UptimeKumaApi(UPTIME_KUMA_URL)

    try:
        api.setup(username=USERNAME, password=PASSWORD)
        print("Admin account created.")
    except Exception as e:
        print(f"Setup failed (likely already exists), logging in: {e}")
        api.login(username=USERNAME, password=PASSWORD)
        print("Logged in.")

    STATUS_PAGE_SLUG   = "homelab"
    STATUS_PAGE_TITLE  = "Homelab Status"
    STATUS_PAGE_DOMAIN = "status.meirong.dev"

    # --- Notification (Telegram) = dead-man's switch ---
    # oracle Uptime Kuma pings homelab public services (Grafana/Vault/ArgoCD/Calibre) + oracle
    # services. Attaching a Telegram notification to ALL monitors means: homelab down → its services
    # unreachable → Uptime Kuma → Telegram Bot API (oracle → internet direct), with NO dependency
    # on homelab. 2026-07 起不再经 Gotify（已下线）；oracle 直连 api.telegram.org，独立性不变。
    # Same bot/group/topic as homelab Alertmanager's telegramConfigs — 「🚨 Homelab 告警」话题。
    TELEGRAM_BOT_TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN")
    TELEGRAM_CHAT_ID = -1003981213530
    TELEGRAM_MESSAGE_THREAD_ID = 2
    NOTIF_NAME = "Telegram (dead-man)"
    LEGACY_NAMES = {"Gotify (dead-man)"}  # pre-2026-07 name, from before the Telegram migration
    if TELEGRAM_BOT_TOKEN:
        # delete+recreate so the token always reflects the current secret (idempotent refresh);
        # also sweep any legacy-named notification left over from before a provider migration —
        # otherwise it stays isDefault+attached and keeps firing (and failing) against monitors.
        for n in api.get_notifications():
            if n["name"] == NOTIF_NAME or n["name"] in LEGACY_NAMES:
                api.delete_notification(n["id"])
                print(f"Removed stale notification '{n['name']}'.")
        api.add_notification(
            name=NOTIF_NAME,
            type=NotificationType.TELEGRAM,
            isDefault=True,        # auto-attach to future monitors
            applyExisting=True,    # attach to all existing monitors now
            telegramBotToken=TELEGRAM_BOT_TOKEN,
            telegramChatID=str(TELEGRAM_CHAT_ID),
            telegramMessageThreadID=str(TELEGRAM_MESSAGE_THREAD_ID),
        )
        print(f"Telegram notification '{NOTIF_NAME}' created + applied to all monitors.")
    else:
        print("WARNING: TELEGRAM_BOT_TOKEN not set — no notification channel (dead-man's switch inactive).")

    # --- Monitors ---
    existing = {m["name"]: m for m in api.get_monitors()}
    print(f"Existing monitors: {set(existing.keys()) or '(none)'}")

    for m in MONITORS:
        extra = {}
        if "accepted_statuscodes" in m:
          extra["accepted_statuscodes"] = m["accepted_statuscodes"]
        else:
          extra["accepted_statuscodes"] = ["200-299"]

        # Pass through optional monitor parameters used by Uptime Kuma HTTP checks.
        for field in ("ignoreTls", "maxredirects", "timeout", "method"):
          if field in m:
            extra[field] = m[field]
        if m["name"] in existing:
            # Always update URL and accepted_statuscodes to ensure they stay in sync
            api.edit_monitor(existing[m["name"]]["id"], url=m["url"], **extra)
            print(f"  updated {m['name']} -> {m['url']} (accepted={extra['accepted_statuscodes']})")
            continue
        api.add_monitor(type=MonitorType.HTTP, name=m["name"], url=m["url"], interval=60, **extra)
        print(f"  added {m['name']} -> {m['url']}")

    # --- Public status page ---
    monitor_entries  = [{"id": m["id"], "sendUrl": False} for m in api.get_monitors()]
    existing_pages   = {p["slug"] for p in api.get_status_pages()}

    if STATUS_PAGE_SLUG not in existing_pages:
        api.add_status_page(slug=STATUS_PAGE_SLUG, title=STATUS_PAGE_TITLE)
        print(f"Status page '{STATUS_PAGE_SLUG}' created.")

    api.save_status_page(
        slug=STATUS_PAGE_SLUG,
        title=STATUS_PAGE_TITLE,
        description="Real-time status of Homelab services",
        theme="auto",
        published=True,
        showTags=False,
        domainNameList=[STATUS_PAGE_DOMAIN],
        customCSS="",
        footerText="",
        showPoweredBy=False,
        publicGroupList=[{
            "name": "Services",
            "weight": 1,
            "monitorList": monitor_entries,
        }],
    )
    print(f"Status page updated: https://{STATUS_PAGE_DOMAIN}")

    api.disconnect()
    print("Provisioning complete.")
---
# ArgoCD PostSync hook：每次 sync 后运行，重新校准 uptime-kuma monitors(脚本幂等)。
# 改 MONITORS 后 git push → ArgoCD 同步 → 此 hook 自动 reprovision(贴合 CLAUDE.md 意图)。
# hook-delete-policy: 成功即删 + 下次创建前先删;失败则保留 Job 供排查并使 sync 标记失败。
# 集群已纳入 homelab ArgoCD(2026-06-04);亦可手动 kubectl apply -f 跑。
apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-provisioner
  namespace: personal-services
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: provisioner
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - pip install --quiet uptime-kuma-api==1.2.1 && python /scripts/provision.py
          env:
            - name: UPTIME_KUMA_URL
              value: "http://uptime-kuma.personal-services.svc:3001"
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-admin
                  key: username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-admin
                  key: password
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-admin
                  key: telegram_bot_token
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: uptime-kuma-provisioner
