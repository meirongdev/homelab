apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uptime-kuma-admin
  namespace: personal-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: uptime-kuma-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: oracle-k3s/uptime-kuma
        property: admin_username
    - secretKey: password
      remoteRef:
        key: oracle-k3s/uptime-kuma
        property: admin_password
    # Gotify "alertmanager_app" token（与 homelab AM bridge 同一"告警"应用；已验证对 oracle Gotify 有效）
    # → Uptime Kuma Gotify 通知（dead-man's switch）。redpanda 的 token 不在迁移后的 gotify.db 里(401)。
    - secretKey: gotify_token
      remoteRef:
        key: homelab/gotify
        property: alertmanager_app_token
