apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uptime-kuma-admin
  namespace: personal-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: uptime-kuma-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: oracle-k3s/uptime-kuma
        property: admin_username
    - secretKey: password
      remoteRef:
        key: oracle-k3s/uptime-kuma
        property: admin_password
    # Telegram bot token（与 homelab Alertmanager 同一个 bot，跨集群读取）
    # → Uptime Kuma Telegram 通知（dead-man's switch）。2026-07 起 Gotify 已下线。
    - secretKey: telegram_bot_token
      remoteRef:
        key: homelab/telegram
        property: bot_token
