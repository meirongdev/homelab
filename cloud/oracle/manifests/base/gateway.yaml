# Gateway for oracle-k3s services
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: oracle-gateway
  namespace: kube-system
  annotations:
    # external-dns target for this cluster's subdomains. oracle-gateway is an addressless
    # LoadBalancer (no readable address), so external-dns can't derive a target from its
    # status — this annotation supplies the oracle tunnel CNAME explicitly (same approach as
    # homelab-gateway). REQUIRED: without it external-dns produces no endpoints for oracle
    # HTTPRoutes (--default-targets/--force-default-targets do NOT substitute for it here).
    external-dns.alpha.kubernetes.io/target: bc630e77-867f-4716-a1d0-8721bf9880da.cfargotunnel.com
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
# ReferenceGrant: allow HTTPRoute in rss-system to reference services
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-rss
  namespace: rss-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: rss-system
  to:
    - group: ""
      kind: Service
---
# ReferenceGrant: allow HTTPRoute in homepage to reference services
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-homepage
  namespace: homepage
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: homepage
  to:
    - group: ""
      kind: Service
---
# ReferenceGrant: allow HTTPRoute in personal-services to reference services
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-personal-services
  namespace: personal-services
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: personal-services
  to:
    - group: ""
      kind: Service
---
# HTTPRoute: rss.meirong.dev -> miniflux
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: miniflux
  namespace: rss-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: oracle-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "rss.meirong.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: miniflux
          port: 8080
          weight: 1
---
# HTTPRoute: home.meirong.dev -> homepage
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: oracle-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "home.meirong.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: homepage
          port: 3000
          weight: 1
---
# HTTPRoute: status.meirong.dev -> uptime-kuma
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: uptime-kuma
  namespace: personal-services
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: oracle-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "status.meirong.dev"
  rules:
    # /api/push goes through the POST→GET shim sidecar (port 3002): Alertmanager's
    # webhook receiver can only POST, Kuma's push endpoint is GET-only.
    - matches:
        - path:
            type: PathPrefix
            value: /api/push
      backendRefs:
        - group: ""
          kind: Service
          name: uptime-kuma
          port: 3002
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: uptime-kuma
          port: 3001
          weight: 1
---
# HTTPRoute: keep.meirong.dev -> karakeep
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: karakeep
  namespace: rss-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: oracle-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "keep.meirong.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: karakeep
          port: 3000
          weight: 1
---
# HTTPRoute: auth.meirong.dev -> zitadel + zitadel-login (migrated from homelab 2026-07-06)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zitadel
  namespace: zitadel
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: oracle-gateway
      namespace: kube-system
      port: 80
  hostnames:
    - "auth.meirong.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ui/v2/login
      backendRefs:
        - group: ""
          kind: Service
          name: zitadel-login
          port: 3000
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: zitadel
          port: 8080
          weight: 1
