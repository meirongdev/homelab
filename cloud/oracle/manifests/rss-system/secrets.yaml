    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: nextauth-secret
      remoteRef:
        key: oracle-k3s/karakeep
        property: nextauth_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: meili-master-key
      remoteRef:
        key: oracle-k3s/karakeep
