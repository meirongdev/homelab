apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miniflux-db-secret
  namespace: rss-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: miniflux-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        password: "{{ .password }}"
        database-url: "postgres://miniflux:{{ .password }}@rss-postgres.rss-system.svc.cluster.local:5432/miniflux?sslmode=disable"
  data:
    - secretKey: password
      remoteRef:
        key: oracle-k3s/miniflux
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miniflux-admin-secret
  namespace: rss-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: miniflux-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: oracle-k3s/miniflux
        property: admin_username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: password
      remoteRef:
        key: oracle-k3s/miniflux
        property: admin_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # ZITADEL OIDC client (native SSO; local admin login above stays as fallback).
    # Provisioned by zitadel/scripts/configure-oidc-app.sh (app "miniflux",
    # redirect https://rss.meirong.dev/oauth2/oidc/callback). Same Vault path
    # secret/oracle-k3s/miniflux (keys: oauth_client_id, oauth_client_secret).
    - secretKey: oauth-client-id
      remoteRef:
        key: oracle-k3s/miniflux
        property: oauth_client_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oauth-client-secret
      remoteRef:
        key: oracle-k3s/miniflux
        property: oauth_client_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
