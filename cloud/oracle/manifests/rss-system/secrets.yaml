apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miniflux-db-secret
  namespace: rss-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: miniflux-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        password: "{{ .password }}"
        database-url: "postgres://miniflux:{{ .password }}@rss-postgres.rss-system.svc.cluster.local:5432/miniflux?sslmode=disable"
  data:
    - secretKey: password
      remoteRef:
        key: oracle-k3s/miniflux
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
