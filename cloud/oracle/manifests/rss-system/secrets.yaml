        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # ZITADEL OIDC client (native NextAuth SSO; password login stays as fallback).
    # Provisioned by zitadel/scripts/configure-oidc-app.sh (app "karakeep",
    # redirect https://keep.meirong.dev/api/auth/callback/custom). Same Vault path
    # secret/oracle-k3s/karakeep (keys: oauth_client_id, oauth_client_secret).
    - secretKey: oauth-client-id
      remoteRef:
        key: oracle-k3s/karakeep
        property: oauth_client_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: oauth-client-secret
      remoteRef:
        key: oracle-k3s/karakeep
        property: oauth_client_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
