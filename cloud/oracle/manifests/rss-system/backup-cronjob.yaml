---
# Kopia backup ExternalSecret for rss-system
# Pulls kopia server credentials from Vault (requires ESO to be healthy)
# If ESO is broken, create the secret manually:
#   kubectl --context oracle-k3s create secret generic kopia-backup-secret \
#     -n rss-system \
#     --from-literal=server-url=https://100.94.186.7:31515 \
#     --from-literal=server-fingerprint=281d63a1f327c0e31791c4eaad48b8bd27675efd1dc73ceb374c8607ccb0be01 \
#     --from-literal=password=<kopia-repo-password>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-backup-secret
  namespace: rss-system
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: kopia-backup-secret
    creationPolicy: Owner
  data:
    - secretKey: server-url
      remoteRef:
        key: homelab/kopia
        property: server_url
    - secretKey: server-fingerprint
      remoteRef:
        key: homelab/kopia
        property: server_fingerprint
    - secretKey: password
      remoteRef:
        key: homelab/kopia
        property: repo-password
---
# CronJob: daily backup of rss-system data to homelab kopia server
# - Miniflux PostgreSQL → pg_dump → kopia snapshot
# - KaraKeep SQLite (db.db, queue.db) → sqlite3 backup → kopia snapshot
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-backup
  namespace: rss-system
  labels:
    app: kopia-backup
spec:
  # 备份时间: 每天凌晨 3:00 (UTC) = 北京时间 11:00
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # 最长执行时间 1 小时
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: kopia-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: default
          volumes:
            # 临时暂存目录：用于放置 dump 文件，再由 kopia 打快照
            - name: staging
              emptyDir:
                sizeLimit: 2Gi
            # KaraKeep SQLite 数据 (RWO PVC, 同节点可共享挂载)
            - name: karakeep-data
              persistentVolumeClaim:
                claimName: karakeep-data
                readOnly: true
          initContainers:
            # Step 1: Miniflux PostgreSQL dump
            - name: pg-dump
              image: postgres:15-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: miniflux-db-secret
                      key: password
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /staging/postgres
                  echo "Dumping Miniflux PostgreSQL..."
                  pg_dump -h rss-postgres -U miniflux -d miniflux \
                    --format=custom --compress=9 \
                    -f /staging/postgres/miniflux.dump
                  echo "PostgreSQL dump done: $(du -sh /staging/postgres/miniflux.dump | cut -f1)"
              volumeMounts:
                - name: staging
                  mountPath: /staging
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

            # Step 2: KaraKeep SQLite backup (cp WAL-trio: .db + .db-wal + .db-shm)
            - name: sqlite-karakeep
              image: alpine:3.21
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /staging/karakeep
                  echo "Backing up KaraKeep SQLite databases..."
                  # Copy .db + WAL files atomically (read-only PVC mount ensures consistency)
                  cp /karakeep/db.db /staging/karakeep/db.db
                  cp /karakeep/db.db-wal /staging/karakeep/db.db-wal 2>/dev/null || true
                  cp /karakeep/db.db-shm /staging/karakeep/db.db-shm 2>/dev/null || true
                  cp /karakeep/queue.db /staging/karakeep/queue.db
                  cp /karakeep/queue.db-wal /staging/karakeep/queue.db-wal 2>/dev/null || true
                  cp /karakeep/queue.db-shm /staging/karakeep/queue.db-shm 2>/dev/null || true
                  echo "KaraKeep backup done:"
                  ls -lh /staging/karakeep/
              volumeMounts:
                - name: staging
                  mountPath: /staging
                - name: karakeep-data
                  mountPath: /karakeep
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

          # Main container: kopia snapshot to homelab server
          containers:
            - name: kopia-snapshot
              image: kopia/kopia@sha256:bd6a449c263465c388339c0637dcd25562e99dcdde286c9d51ade81e138bbf2c  # digest 固定（与 homelab kopia 一致，原 :latest）
              env:
                - name: KOPIA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: kopia-backup-secret
                      key: password
                - name: KOPIA_SERVER_URL
                  valueFrom:
                    secretKeyRef:
                      name: kopia-backup-secret
                      key: server-url
                - name: KOPIA_SERVER_FINGERPRINT
                  valueFrom:
                    secretKeyRef:
                      name: kopia-backup-secret
                      key: server-fingerprint
                - name: KOPIA_CHECK_FOR_UPDATES
                  value: "false"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Connecting to kopia server at $KOPIA_SERVER_URL..."
                  # scheme 自适应：仅 https 服务器才传 cert fingerprint。kopia 服务器现为 --insecure
                  # (明文，oracle→homelab 经 Tailscale/WireGuard 已加密)，server-url=http:// 时不传 fingerprint
                  # （kopia 对 http+fingerprint 组合会报错）。日后恢复 TLS 只需把 Vault server-url 改回 https://。
                  FP_ARG=""
                  case "$KOPIA_SERVER_URL" in
                    https://*) FP_ARG="--server-cert-fingerprint=$KOPIA_SERVER_FINGERPRINT" ;;
                  esac
                  kopia repository connect server \
                    --url="$KOPIA_SERVER_URL" \
                    $FP_ARG \
                    --override-username=backup \
                    --override-hostname=oracle-k3s \
                    --config-file=/tmp/kopia.config \
                    --cache-directory=/tmp/kopia-cache

                  echo "Creating snapshot of /staging (rss-system)..."
                  kopia snapshot create /staging \
                    --config-file=/tmp/kopia.config \
                    --tags="cluster:oracle-k3s" \
                    --tags="namespace:rss-system"

                  echo "Snapshot status:"
                  kopia snapshot list /staging \
                    --config-file=/tmp/kopia.config \
                    --all | tail -5

                  kopia repository disconnect \
                    --config-file=/tmp/kopia.config
                  echo "Backup completed successfully."
              volumeMounts:
                - name: staging
                  mountPath: /staging
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
