---
# Redpanda Connect — 信息管道
# 管道 1: 接收 Miniflux Webhook → 保存到 KaraKeep
# （原管道 2: 定时轮询 KaraKeep tag=telegram → 推送到 Gotify，2026-07 随 Gotify 下线一并砍掉，
#  未迁移到 Telegram——该 token 当时已 401 失效，推送早已静默失败，用得也不多）
apiVersion: v1
kind: ConfigMap
metadata:
  name: redpanda-connect-config
  namespace: rss-system
data:
  connect.yaml: |
    http:
      enabled: true
      address: "0.0.0.0:4195"

    input:
      http_server:
        path: /save_entry
        allowed_verbs:
          - POST

    pipeline:
      processors:
        - mapping: |
            root.type = "link"
            root.url = this.entry.url
            root.title = this.entry.title

    output:
      http_client:
        url: "http://karakeep.rss-system.svc:3000/api/v1/bookmarks"
        verb: POST
        headers:
          Authorization: "Bearer ${KARAKEEP_API_KEY}"
          Content-Type: "application/json"
        retries: 3
        retry_period: "5s"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-connect
  namespace: rss-system
  labels:
    app: redpanda-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-connect
  template:
    metadata:
      labels:
        app: redpanda-connect
    spec:
      containers:
        # 管道 1: Miniflux Webhook → KaraKeep
        - name: webhook-to-karakeep
          image: docker.redpanda.com/redpandadata/connect@sha256:d8c46bd81e483d3f08327d38f363b9bc54478a150611aaff0c905a3b977d7f6a  # 当前运行 digest 固定（原 :latest）
          args:
            - run
            - /config/connect.yaml
          ports:
            - containerPort: 4195
              name: http
          env:
            - name: KARAKEEP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: redpanda-connect-secret
                  key: karakeep-api-key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /ready
              port: 4195
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 4195
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: redpanda-connect-config
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-connect
  namespace: rss-system
spec:
  type: ClusterIP
  selector:
    app: redpanda-connect
  ports:
    - port: 4195
      targetPort: 4195
      name: http
