apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux
  namespace: rss-system
  labels:
    app: miniflux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miniflux
  template:
    metadata:
      labels:
        app: miniflux
    spec:
      containers:
        - name: miniflux
          image: miniflux/miniflux:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: miniflux-db-secret
                  key: database-url
            - name: RUN_MIGRATIONS
              value: "1"
            - name: CREATE_ADMIN
              value: "1"
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: miniflux-admin-secret
                  key: username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-admin-secret
                  key: password
            # --- ZITADEL OIDC SSO (native; local admin login above stays as fallback) ---
            # BASE_URL makes Miniflux build absolute/redirect URLs as https://rss.meirong.dev
            # (it sits behind Cloudflare Tunnel → Cilium Gateway, not localhost).
            - name: BASE_URL
              value: https://rss.meirong.dev
            - name: OAUTH2_PROVIDER
              value: oidc
            # Bare issuer — Miniflux appends /.well-known/openid-configuration itself.
            - name: OAUTH2_OIDC_DISCOVERY_ENDPOINT
              value: https://auth.meirong.dev
            - name: OAUTH2_OIDC_PROVIDER_NAME
              value: ZITADEL
            - name: OAUTH2_REDIRECT_URL
              value: https://rss.meirong.dev/oauth2/oidc/callback
            # Auto-provision a Miniflux user on first SSO login (keyed by OIDC sub/email).
            # The existing local admin can instead link SSO under Settings → keeps admin rights.
            - name: OAUTH2_USER_CREATION
              value: "1"
            - name: OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: miniflux-admin-secret
                  key: oauth-client-id
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: miniflux-admin-secret
                  key: oauth-client-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: miniflux
  namespace: rss-system
spec:
  type: ClusterIP
  selector:
    app: miniflux
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
# 共享 PostgreSQL 实例 — miniflux + karakeep 共用
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rss-postgres
  namespace: rss-system
  labels:
    app: rss-postgres
  annotations:
    # RollingUpdate->Recreate migration: ArgoCD's apply can't drop the API-defaulted
    # spec.strategy.rollingUpdate block (fails validation), so replace (PUT) the object.
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  # Single-writer RWO PVC (miniflux-db-pvc). Default RollingUpdate would start a 2nd
  # postmaster on the same data dir; Recreate stops the old pod first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rss-postgres
  template:
    metadata:
      labels:
        app: rss-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: miniflux
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-db-secret
                  key: password
            - name: POSTGRES_DB
              value: miniflux
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.16.0
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-db-secret
                  key: password
            - name: DATA_SOURCE_NAME
              value: "postgresql://miniflux:$(POSTGRES_PASSWORD)@localhost:5432/miniflux?sslmode=disable"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: miniflux-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rss-postgres
  namespace: rss-system
spec:
  type: ClusterIP
  selector:
    app: rss-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
# Separate service for postgres-exporter metrics endpoint
# Exposed as NodePort so homelab Prometheus can scrape via Tailscale
apiVersion: v1
kind: Service
metadata:
  name: rss-postgres-metrics
  namespace: rss-system
  labels:
    app: rss-postgres
spec:
  type: NodePort
  selector:
    app: rss-postgres
  ports:
    - port: 9187
      targetPort: 9187
      nodePort: 31087
      name: metrics
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: miniflux-db-pvc
  namespace: rss-system
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
