# Cilium CNI values for oracle-k3s (single-node)
# Based on homelab template, adapted for oracle-k3s Pod CIDR
# Docs: https://docs.cilium.io/en/stable/installation/k8s-install-helm/

# --- kube-proxy replacement: DISABLED (retain K3s kube-proxy) ---
kubeProxyReplacement: false

# --- Routing: VXLAN tunnel (consistent with homelab) ---
routingMode: tunnel
tunnelProtocol: vxlan

# --- IPAM: oracle-k3s Pod CIDR ---
ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.52.0.0/16"

# --- Operator: single node, no anti-affinity needed ---
operator:
  replicas: 1

# --- Hubble: observability ---
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# --- Gateway API: disabled (Traefik handles it) ---
gatewayAPI:
  enabled: false

# --- cgroup: K3s mounts cgroup v2 at /sys/fs/cgroup ---
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
